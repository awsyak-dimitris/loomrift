<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Loomrift</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#12141a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
#wrap{position:relative;width:100vw;height:100vh;background:#12141a;overflow:hidden}

/* TOPBAR */
#topbar{display:flex;align-items:center;gap:5px;padding:0 14px;height:46px;background:#1a1d26;border-bottom:0.5px solid #2a2d3a;z-index:20;position:relative}
#logo-img{height:20px;width:auto;margin-right:6px;opacity:0.9;flex-shrink:0}
.sep{width:0.5px;height:18px;background:#2a2d3a;margin:0 2px;flex-shrink:0}
.tbtn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:0.5px solid #2e3140;background:transparent;color:#5a6070;font-size:11px;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0}
.tbtn .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tbtn:hover{border-color:#3a3f52;color:#9aa0b4}
.tbtn.active{background:#1e2436;border-color:#3a5080;color:#8ab8e8}
.view-btn{padding:5px 10px;border-radius:20px;border:0.5px solid #2e3140;background:transparent;color:#5a6070;font-size:11px;cursor:pointer;transition:all .18s;white-space:nowrap;margin-left:auto;flex-shrink:0}
.view-btn:hover{border-color:#3a3f52;color:#9aa0b4}
.view-btn.active{background:#2a1e36;border-color:#6a3a80;color:#c08ae8}
#burger-btn{width:32px;height:32px;display:flex;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;padding:4px;border-radius:8px;flex-shrink:0;margin-right:4px;border:none;background:transparent}
#burger-btn:hover{background:rgba(255,255,255,0.06)}
#burger-btn span{display:block;height:1.5px;background:#8a92a8;border-radius:2px;transition:all .2s}

/* SIDEBAR */
#sidebar{position:absolute;top:46px;left:0;width:260px;height:calc(100vh - 46px);background:#161820;border-right:0.5px solid #2a2d3a;z-index:15;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;overflow-x:hidden;padding-bottom:40px}
#sidebar.open{transform:translateX(0)}
#sidebar-header{padding:14px 16px 8px;font-size:10px;font-weight:600;color:#5a6070;letter-spacing:.12em;text-transform:uppercase;border-bottom:0.5px solid #2a2d3a;margin-bottom:4px}

/* Tree — Finder style */
.ti{display:flex;flex-direction:column}
.ti-row{display:flex;align-items:center;height:26px;cursor:pointer;border-radius:6px;margin:0 4px;padding:0 6px 0 0;user-select:none;transition:background .12s;min-width:0}
.ti-row:hover{background:rgba(255,255,255,0.055)}
.ti-row.active{background:rgba(58,122,208,0.18)}
.ti-arrow{width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#5a6070;font-size:9px;transition:transform .15s}
.ti-arrow.open{transform:rotate(0deg)}
.ti-arrow.closed{transform:rotate(-90deg)}
.ti-arrow.leaf{opacity:0}
.ti-ico{width:14px;height:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-right:5px}
.ti-ico img{width:12px;height:12px;object-fit:contain;opacity:0.75}
.ti-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-right:6px}
.ti-lbl{font-size:12px;color:#c8cdd8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;line-height:1}
.ti-role{font-size:10px;color:#5a6070;white-space:nowrap;margin-left:4px;flex-shrink:0}
.ti-children{display:flex;flex-direction:column}
.ti-children.hidden{display:none}
/* indent line */
.ti-indent{display:flex;flex-direction:column;padding-left:8px;position:relative}
.ti-indent::before{content:"";position:absolute;left:15px;top:0;bottom:0;width:0.5px;background:#2a2d3a}
/* HINT */
#hint{position:absolute;top:56px;left:50%;transform:translateX(-50%);z-index:10;background:rgba(22,24,31,0.85);border:0.5px solid #2e3140;border-radius:10px;padding:5px 16px;font-size:10px;color:#8a92a8;pointer-events:none;white-space:nowrap;transition:left .28s}
#tooltip{position:absolute;display:none;background:rgba(22,24,31,0.95);border:0.5px solid #2e3140;border-radius:10px;padding:8px 12px;pointer-events:none;z-index:30;min-width:100px}

/* CONTEXT MENU */
#ctx-menu{position:absolute;display:none;background:#1e2030;border:0.5px solid #3a3d50;border-radius:12px;z-index:50;padding:6px;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.ctx-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:12px;color:#c0c8d8;cursor:pointer;transition:background .15s}
.ctx-item:hover{background:rgba(255,255,255,0.06)}
.ctx-item.danger{color:#E51000}
.ctx-item.danger:hover{background:rgba(229,16,0,0.1)}
.ctx-sep{height:0.5px;background:#2a2d3a;margin:4px 0}
.ctx-icon{font-size:14px;width:18px;text-align:center}
.ctx-node-name{font-size:10px;color:#5a6070;padding:6px 12px 2px;font-weight:500}

/* FLOATING + BUTTON */
#fab{position:absolute;bottom:28px;right:28px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#3a7ad0,#1a5ab0);border:none;cursor:pointer;z-index:25;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(58,122,208,0.4);transition:all .2s;color:#fff;font-size:24px;font-weight:300}
#fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(58,122,208,0.6)}
#fab:active{transform:scale(0.96)}

/* MODAL */
#modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.55);z-index:60;display:none;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
#modal{background:#1a1d2a;border:0.5px solid #2e3140;border-radius:16px;padding:24px;width:340px;max-width:90vw;box-shadow:0 16px 60px rgba(0,0,0,0.6)}
#modal h3{font-size:15px;font-weight:600;color:#e0e4f0;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:#8a92a8;margin-bottom:6px;font-weight:500}
.field input,.field select{width:100%;background:#12141e;border:0.5px solid #3a3d50;border-radius:8px;padding:9px 12px;font-size:13px;color:#dde2f0;outline:none;transition:border .15s}
.field input:focus,.field select:focus{border-color:#3a7ad0}
.field select option{background:#1a1d2a}
.modal-btns{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.mbtn{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.mbtn.cancel{background:#2a2d3a;color:#8a92a8}
.mbtn.cancel:hover{background:#323544}
.mbtn.primary{background:#3a7ad0;color:#fff}
.mbtn.primary:hover{background:#4a8ae0}
.mbtn.danger{background:#E51000;color:#fff}
.mbtn.danger:hover{background:#c01000}

/* CANVASES */
#lc{position:absolute;top:46px;left:0;pointer-events:none;z-index:1}
#c{position:absolute;top:46px;left:0;display:block;z-index:2}
</style>
</head>

function drawGrid(){
  lctx.fillStyle="#12141a";lctx.fillRect(0,0,W,H);
  var CELL=80,cols=Math.ceil(W/CELL)+1,rows=Math.ceil(H/CELL)+1;

  for(var x=0;x<=cols;x++){lctx.beginPath();lctx.moveTo(x*CELL,0);lctx.lineTo(x*CELL,H);lctx.stroke();}
  for(var y=0;y<=rows;y++){lctx.beginPath();lctx.moveTo(0,y*CELL);lctx.lineTo(W,y*CELL);lctx.stroke();}
  var s1=42;function rng1(){s1=(s1*9301+49297)%233280;return s1/233280;}
  for(var xi=0;xi<=cols;xi++){for(var yi=0;yi<=rows;yi++){if(rng1()<0.16){var px=xi*CELL,py=yi*CELL,sz=rng1()<0.28?2.4:1.4,al=0.08+rng1()*0.18;lctx.fillStyle="rgba(255,255,255,"+al+")";lctx.beginPath();lctx.arc(px,py,sz,0,Math.PI*2);lctx.fill();}}}
  var s2=137;function rng2(){s2=(s2*9301+49297)%233280;return s2/233280;}
  lctx.lineWidth=0.6;
  for(var xi=0;xi<=cols;xi++){for(var yi=0;yi<=rows;yi++){if(rng2()<0.05){var px=xi*CELL,py=yi*CELL,cs=4;lctx.strokeStyle="rgba(255,255,255,0.14)";lctx.beginPath();lctx.moveTo(px-cs,py);lctx.lineTo(px+cs,py);lctx.stroke();lctx.beginPath();lctx.moveTo(px,py-cs);lctx.lineTo(px,py+cs);lctx.stroke();}}}
  var brs=[{x:80,y:40,w:112,h:60},{x:W-180,y:36,w:88,h:52},{x:28,y:Math.floor(rows*0.5)*CELL,w:80,h:80},{x:W-140,y:Math.floor(rows*0.42)*CELL,w:100,h:68}];
  brs.forEach(function(b){lctx.strokeStyle="rgba(255,255,255,0.12)";lctx.lineWidth=0.7;var x=b.x,y=b.y,w=b.w,h=b.h,cs=7;lctx.beginPath();lctx.moveTo(x+cs,y);lctx.lineTo(x,y);lctx.lineTo(x,y+cs);lctx.stroke();lctx.beginPath();lctx.moveTo(x+w-cs,y);lctx.lineTo(x+w,y);lctx.lineTo(x+w,y+cs);lctx.stroke();lctx.beginPath();lctx.moveTo(x+cs,y+h);lctx.lineTo(x,y+h);lctx.lineTo(x,y+h-cs);lctx.stroke();lctx.beginPath();lctx.moveTo(x+w-cs,y+h);lctx.lineTo(x+w,y+h);lctx.lineTo(x+w,y+h-cs);lctx.stroke();});
  var vig=lctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.9);vig.addColorStop(0,"rgba(18,20,26,0)");vig.addColorStop(1,"rgba(18,20,26,0.58)");lctx.fillStyle=vig;lctx.fillRect(0,0,W,H);
}

function separateNodes(){
  var nodes=Object.values(nodeMap).filter(function(n){return visibleNodes.has(n.id);});
  var MIN=20;
  for(var iter=0;iter<4;iter++){
    for(var i=0;i<nodes.length;i++){
      for(var j=i+1;j<nodes.length;j++){
        var a=nodes[i],b=nodes[j];
        var minD=(a.sz+b.sz)*0.6+MIN;
        var dx=b.targetPos.x-a.targetPos.x,dy=b.targetPos.y-a.targetPos.y,dz=b.targetPos.z-a.targetPos.z;
        var d=Math.sqrt(dx*dx+dy*dy+dz*dz);
        if(d<minD&&d>0.01){var push=(minD-d)/2/d;
          a.targetPos.x-=dx*push;a.targetPos.y-=dy*push*0.5;a.targetPos.z-=dz*push;
          b.targetPos.x+=dx*push;b.targetPos.y+=dy*push*0.5;b.targetPos.z+=dz*push;}
      }
    }
  }
}

function toggleSidebar(){
  sidebarOpen=!sidebarOpen;
  document.getElementById("sidebar").classList.toggle("open",sidebarOpen);
}

var sidebarExpandedIds=new Set(["mixa"]);

function buildSidebarTree(){
  var root2=document.getElementById("tree-root");
  root2.innerHTML="";

  function makeItem(n, depth){
    var wrap=document.createElement("div");
    wrap.className="ti";

    // Row
    var row=document.createElement("div");
    row.className="ti-row"+(n.id===selId?" active":"");
    // indent = depth * 16px (arrow width) via nested ti-indent, but we do it manually
    row.style.paddingLeft=(depth*16+4)+"px";

    // Arrow toggle
    var arrow=document.createElement("span");
    arrow.className="ti-arrow "+(n.children.length===0?"leaf":(sidebarExpandedIds.has(n.id)?"open":"closed"));
    arrow.innerHTML=n.children.length?"&#9660;":"";
    row.appendChild(arrow);

    // Shape icon
    var ico=document.createElement("div");ico.className="ti-ico";
    var img=document.createElement("img");
    var sk=n.shape==="hexagon"?"triangle":(n.shape==="main"?"main":n.shape);
    if(!ICONS[sk])sk="circle";
    img.src=ICONS[sk].def;
    img.style.filter="brightness(0) invert(1)";
    img.style.opacity="0.55";
    ico.appendChild(img);row.appendChild(ico);

    // Color dot
    var dot=document.createElement("div");dot.className="ti-dot";
    var col=nodeEffCol[n.id]||n.color;
    dot.style.background="#"+(col).toString(16).padStart(6,"0");
    row.appendChild(dot);

    // Label
    var lbl=document.createElement("span");lbl.className="ti-lbl";lbl.textContent=n.label;
    row.appendChild(lbl);

    // Role (muted, short)
    var role=document.createElement("span");role.className="ti-role";role.textContent=n.role;
    row.appendChild(role);

    // Click: toggle expand + focus
    row.addEventListener("click",function(e){
      e.stopPropagation();
      if(visibleNodes.has(n.id)){
        tPan.set(n.targetPos.x,n.targetPos.y,0);
        tSph.radius=Math.max(80,Math.min(400,n.sz*14));
      }
      if(n.children.length){
        if(sidebarExpandedIds.has(n.id))sidebarExpandedIds.delete(n.id);
        else sidebarExpandedIds.add(n.id);
        buildSidebarTree();
      }
    });
    row.addEventListener("contextmenu",function(e){e.preventDefault();showCtxMenu(n.id,e.clientX,e.clientY);});
    wrap.appendChild(row);

    // Children
    if(n.children.length){
      var ch=document.createElement("div");
      ch.className="ti-children"+(sidebarExpandedIds.has(n.id)?"":" hidden");
      n.children.forEach(function(c){ch.appendChild(makeItem(c,depth+1));});
      wrap.appendChild(ch);
    }
    return wrap;
  }

  root2.appendChild(makeItem(nodeMap["mixa"],0));
}

function ctxAction(act){
  hideCtxMenu();
  if(!ctxTargetId)return;
  var n=nodeMap[ctxTargetId];
  if(act==="expand"){toggleNode(ctxTargetId);applyMode(currentMode===2?ctxTargetId:null);}

function deleteNode(id){
  if(id==="mixa")return;
  var n=nodeMap[id];
  var parent=n.parentId?nodeMap[n.parentId]:null;
  if(parent){parent.children=parent.children.filter(function(c){return c.id!==id;});}
  // remove subtree
  function removeSub(nid){var nd=nodeMap[nid];if(nd.children)nd.children.forEach(function(c){removeSub(c.id);});visibleNodes.delete(nid);expandedNodes.delete(nid);delete nodeMap[nid];if(sprObjs[nid]){scene.remove(sprObjs[nid]);delete sprObjs[nid];}if(lblObjs[nid]){scene.remove(lblObjs[nid]);delete lblObjs[nid];}if(hitObjs[nid]){scene.remove(hitObjs[nid]);delete hitObjs[nid];}}

});
canvas.addEventListener("wheel",function(e){e.preventDefault();tSph.radius=Math.max(80,Math.min(1200,tSph.radius+e.deltaY*.5));},{passive:false});
canvas.addEventListener("click",function(e){if(moved||isPanning||spaceDown)return;var rect=canvas.getBoundingClientRect();mouse.x=((e.clientX-rect.left)/W)*2-1;mouse.y=-((e.clientY-rect.top)/H)*2+1;raycaster.setFromCamera(mouse,camera);var hittable=Object.values(hitObjs).filter(function(m){return visibleNodes.has(m.userData.id);});var hits=raycaster.intersectObjects(hittable);if(hits.length>0)handleClick(hits[0].object.userData.id);});

function sphToCart(s,pan){return new THREE.Vector3(pan.x+s.radius*Math.sin(s.phi)*Math.sin(s.theta),pan.y+s.radius*Math.cos(s.phi),s.radius*Math.sin(s.phi)*Math.cos(s.theta));}
function project(p3){var v=p3.clone();v.project(camera);return{x:(v.x*.5+.5)*W,y:(-.5*v.y+.5)*H};}
function screenRadius(n){var e3=n.pos.clone().add(new THREE.Vector3(n.sz*.5,0,0));var c2=project(n.pos),e2=project(e3);return Math.sqrt(Math.pow(e2.x-c2.x,2)+Math.pow(e2.y-c2.y,2));}
function shorten(ax,ay,bx,by,amt){var dx=bx-ax,dy=by-ay,d=Math.sqrt(dx*dx+dy*dy);if(d<amt*2)return{x:ax,y:ay};var t=amt/d;return{x:ax+dx*t,y:ay+dy*t};}

function drawLines(){
  lctx.putImageData(gridSnap,0,0);
  edgeData.forEach(function(e){
    var n=nodeMap[e.nid],p=nodeMap[e.pid];if(!n||!p)return;
    if(!visibleNodes.has(e.nid)||!visibleNodes.has(e.pid))return;
    var ec=currentMode===4?MONO:(nodeEffCol[e.nid]||n.color);
    var r=(ec>>16)&255,g=(ec>>8)&255,b=ec&255;
    var a2=project(n.pos),b2=project(p.pos);
    var rN=screenRadius(n)*1.05,rP=screenRadius(p)*1.05;
    var sp=shorten(a2.x,a2.y,b2.x,b2.y,rN),ep=shorten(b2.x,b2.y,a2.x,a2.y,rP);
    lctx.beginPath();if(e.lvl>=4)lctx.setLineDash([5,9]);else lctx.setLineDash([]);
    lctx.moveTo(sp.x,sp.y);lctx.lineTo(ep.x,ep.y);
    lctx.strokeStyle="rgba("+r+","+g+","+b+","+(currentMode===4?0.3:0.55)+")";
    lctx.lineWidth=1.8;lctx.lineCap="round";lctx.stroke();lctx.setLineDash([]);
  });
}

function animate(){
  requestAnimationFrame(animate);
  var now=performance.now()/1000,dt=Math.min(now-lastT,.05);lastT=now;
  if(is2D){tSph.theta=0;tSph.phi=Math.PI/2;}
  sph.theta+=(tSph.theta-sph.theta)*.07;sph.phi+=(tSph.phi-sph.phi)*.07;sph.radius+=(tSph.radius-sph.radius)*.07;
  panOffset.lerp(tPan,.09);
  var cp=sphToCart(sph,panOffset);camera.position.copy(cp);camera.lookAt(panOffset.x,panOffset.y,0);camera.up.set(0,1,0);
  if(selId&&visibleNodes.has(selId)){if(pulseActive){pulsePhase+=dt/PULSE_DUR;if(pulsePhase>=1){pulsePhase=1;pulseActive=false;pulsePause=PULSE_PAUSE;}}else{pulsePause-=dt;if(pulsePause<=0){pulsePhase=0;pulseActive=true;}}drawPulse(nodeEffCol[selId]||nodeMap[selId].color,pulsePhase);var sn=nodeMap[selId];pSp.position.copy(sn.pos);pSp.scale.set(sn.sz*5,sn.sz*5,1);pMat.opacity=.9;}else{pCv.getContext("2d").clearRect(0,0,128,128);pTex.needsUpdate=true;pMat.opacity=0;}
  Object.values(nodeMap).forEach(function(n){
    n.pos.lerp(n.targetPos,.09);var vis=visibleNodes.has(n.id),spawn=1;
    if(vis&&n.birthTime>0){var age=now-n.birthTime;if(age<0)spawn=0;else if(age<.4){var t=age/.4,s2=1.7;spawn=Math.max(0,Math.min(1,t*t*((s2+1)*t-s2)));}}
    var sp=sprObjs[n.id],lb=lblObjs[n.id],hm=hitObjs[n.id];
    if(sp){sp.position.copy(n.pos);sp.scale.set(n.sz*spawn,n.sz*spawn,1);sp.material.opacity=vis?spawn:0;}
    if(lb){var off=n.sz*.6+n.sz*.65;lb.position.set(n.pos.x,n.pos.y+off*spawn,n.pos.z);var ls=n.sz*1.2*spawn;lb.scale.set(ls*4,ls,1);lb.material.opacity=vis?spawn:0;lb.quaternion.copy(camera.quaternion);}
    if(hm){hm.position.copy(n.pos);hm.quaternion.copy(camera.quaternion);}
  });
  renderer.render(scene,camera);drawLines();
}
</script>
