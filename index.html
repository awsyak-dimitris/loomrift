<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loomrift</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#12141a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
#wrap{position:relative;width:100vw;height:100vh;background:#12141a;overflow:hidden}
#topbar{display:flex;align-items:center;gap:6px;padding:0 16px;height:46px;background:#1a1d26;border-bottom:0.5px solid #2a2d3a;z-index:20;position:relative}
#logo-img{height:20px;width:auto;margin-right:10px;opacity:0.9;flex-shrink:0}
.sep{width:0.5px;height:18px;background:#2a2d3a;margin:0 4px;flex-shrink:0}
.tbtn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:0.5px solid #2e3140;background:transparent;color:#5a6070;font-size:11px;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0}
.tbtn .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tbtn:hover{border-color:#3a3f52;color:#9aa0b4}
.tbtn.active{background:#1e2436;border-color:#3a5080;color:#8ab8e8}
.view-btn{padding:5px 12px;border-radius:20px;border:0.5px solid #2e3140;background:transparent;color:#5a6070;font-size:11px;cursor:pointer;transition:all .18s;white-space:nowrap;margin-left:auto;flex-shrink:0}
.view-btn:hover{border-color:#3a3f52;color:#9aa0b4}
.view-btn.active{background:#2a1e36;border-color:#6a3a80;color:#c08ae8}
#hint{position:absolute;top:56px;left:50%;transform:translateX(-50%);z-index:10;background:rgba(22,24,31,0.85);border:0.5px solid #2e3140;border-radius:10px;padding:5px 16px;font-size:10px;color:#8a92a8;pointer-events:none;white-space:nowrap}
#tooltip{position:absolute;display:none;background:rgba(22,24,31,0.95);border:0.5px solid #2e3140;border-radius:10px;padding:8px 12px;pointer-events:none;z-index:30;min-width:100px}
/* Single overlay canvas for grid + lines, sits on top of 3D canvas */
#c{position:absolute;top:46px;left:0;display:block;width:100%;height:calc(100vh - 46px)}
#lc{position:absolute;top:46px;left:0;pointer-events:none;z-index:2}
</style>
</head>

window.addEventListener("keyup",function(e){if(e.code==="Space")spaceDown=false;});
canvas.addEventListener("mousedown",function(e){moved=false;lastX=e.clientX;lastY=e.clientY;if(e.button===1){isPanning=true;e.preventDefault();}else if(e.button===0){if(spaceDown||is2D)isPanning=true;else isDragging=true;}canvas.style.cursor=isPanning?"move":"grabbing";});
window.addEventListener("mouseup",function(){isDragging=false;isPanning=false;canvas.style.cursor=spaceDown||is2D?"move":"grab";});
window.addEventListener("mousemove",function(e){var dx=e.clientX-lastX,dy=e.clientY-lastY;if(Math.abs(dx)>1||Math.abs(dy)>1)moved=true;if(isPanning){var sc=tSph.radius/700;tPan.x-=dx*sc;tPan.y+=dy*sc;}else if(isDragging&&!is2D){tSph.theta-=dx*.006;tSph.phi=Math.max(.05,Math.min(Math.PI-.05,tSph.phi+dy*.006));}lastX=e.clientX;lastY=e.clientY;var rect=canvas.getBoundingClientRect();mouse.x=((e.clientX-rect.left)/W)*2-1;mouse.y=-((e.clientY-rect.top)/H)*2+1;raycaster.setFromCamera(mouse,camera);var hittable=Object.values(hitObjs).filter(function(m){return visibleNodes.has(m.userData.id);});var hits=raycaster.intersectObjects(hittable);if(hits.length>0&&!isPanning){var n=nodeMap[hits[0].object.userData.id];var grpHint="";if(currentMode===3&&n.group&&n.group!=="mixa"){var gc=GROUP_COL[n.group];var hx=gc?hexC(gc):"#888";grpHint="<div style='color:"+hx+";font-size:10px;margin-top:3px;font-weight:500'>"+(highlightedGroups.has(n.group)?"● снять":"○ выделить")+" группу</div>";}tooltip.style.display="block";tooltip.style.left=(e.clientX+14)+"px";tooltip.style.top=(e.clientY+20)+"px";tooltip.innerHTML="<div style='font-weight:500;font-size:12px;color:#dde2f0'>"+n.label+"</div><div style='color:#5a6070;font-size:10px;margin-top:2px'>"+n.role+"</div>"+(n.children&&n.children.length?"<div style='color:#8ab8e8;font-size:10px;margin-top:3px'>"+(expandedNodes.has(n.id)?"▲ схлопнуть":"▼ раскрыть")+"</div>":"")+grpHint;canvas.style.cursor="pointer";}else if(!isPanning&&!isDragging){tooltip.style.display="none";canvas.style.cursor=spaceDown||is2D?"move":"grab";}});
canvas.addEventListener("contextmenu",function(e){e.preventDefault();});
canvas.addEventListener("wheel",function(e){e.preventDefault();tSph.radius=Math.max(80,Math.min(900,tSph.radius+e.deltaY*.5));},{passive:false});
canvas.addEventListener("click",function(e){if(moved||isPanning||spaceDown)return;var rect=canvas.getBoundingClientRect();mouse.x=((e.clientX-rect.left)/W)*2-1;mouse.y=-((e.clientY-rect.top)/H)*2+1;raycaster.setFromCamera(mouse,camera);var hittable=Object.values(hitObjs).filter(function(m){return visibleNodes.has(m.userData.id);});var hits=raycaster.intersectObjects(hittable);if(hits.length>0)handleClick(hits[0].object.userData.id);});
function sphToCart(s,pan){return new THREE.Vector3(pan.x+s.radius*Math.sin(s.phi)*Math.sin(s.theta),pan.y+s.radius*Math.cos(s.phi),s.radius*Math.sin(s.phi)*Math.cos(s.theta));}
function project(pos3){var v=pos3.clone();v.project(camera);return{x:(v.x*.5+.5)*W,y:(-.5*v.y+.5)*H};}
function screenRadius(n){var c3=n.pos.clone();var edge3=n.pos.clone().add(new THREE.Vector3(n.sz*.5,0,0));var c2=project(c3),e2=project(edge3);return Math.sqrt(Math.pow(e2.x-c2.x,2)+Math.pow(e2.y-c2.y,2));}
function shortenPoint(ax,ay,bx,by,amount){var dx=bx-ax,dy=by-ay,d=Math.sqrt(dx*dx+dy*dy);if(d<amount*2)return{x:ax,y:ay};var t=amount/d;return{x:ax+dx*t,y:ay+dy*t};}
function drawLines(){
  // Restore grid snapshot then draw lines on top
  lctx.putImageData(gridSnapshot,0,0);
  edgeData.forEach(function(e){var n=nodeMap[e.nid],p=nodeMap[e.pid];if(!n||!p)return;if(!visibleNodes.has(e.nid)||!visibleNodes.has(e.pid))return;var ec=nodeEffCol[e.nid]||n.color;var rgb=hexRgb(ec);var a2=project(n.pos),b2=project(p.pos);var rN=screenRadius(n)*1.05,rP=screenRadius(p)*1.05;var startPt=shortenPoint(a2.x,a2.y,b2.x,b2.y,rN);var endPt=shortenPoint(b2.x,b2.y,a2.x,a2.y,rP);lctx.beginPath();if(e.lvl===4)lctx.setLineDash([6,10]);else lctx.setLineDash([]);lctx.moveTo(startPt.x,startPt.y);lctx.lineTo(endPt.x,endPt.y);lctx.strokeStyle="rgb("+rgb[0]+","+rgb[1]+","+rgb[2]+")";lctx.lineWidth=LW[e.lvl]||1.5;lctx.lineCap="round";lctx.stroke();lctx.setLineDash([]);});}
function animate(){requestAnimationFrame(animate);var now=performance.now()/1000,dt=Math.min(now-lastT,.05);lastT=now;if(is2D){tSph.theta=0;tSph.phi=Math.PI/2;}sph.theta+=(tSph.theta-sph.theta)*.07;sph.phi+=(tSph.phi-sph.phi)*.07;sph.radius+=(tSph.radius-sph.radius)*.07;panOffset.lerp(tPan,.09);var cp=sphToCart(sph,panOffset);camera.position.copy(cp);camera.lookAt(panOffset.x,panOffset.y,0);camera.up.set(0,1,0);if(selId&&visibleNodes.has(selId)){if(pulseActive){pulsePhase+=dt/PULSE_DUR;if(pulsePhase>=1){pulsePhase=1;pulseActive=false;pulsePause=PULSE_PAUSE;}}else{pulsePause-=dt;if(pulsePause<=0){pulsePhase=0;pulseActive=true;}}drawPulse(nodeEffCol[selId]||nodeMap[selId].color,pulsePhase);var sn=nodeMap[selId];pSp.position.copy(sn.pos);pSp.scale.set(sn.sz*4.8,sn.sz*4.8,1);pMat.opacity=.95;}else{pCv.getContext("2d").clearRect(0,0,128,128);pTex.needsUpdate=true;pMat.opacity=0;}Object.values(nodeMap).forEach(function(n){n.pos.lerp(n.targetPos,.09);var vis=visibleNodes.has(n.id),spawn=1;if(vis&&n.birthTime>0){var age=now-n.birthTime;if(age<0)spawn=0;else if(age<.4){var t=age/.4,s2=1.7;spawn=Math.max(0,Math.min(1,t*t*((s2+1)*t-s2)));}}var sp=sprObjs[n.id],lb=lblObjs[n.id],hm=hitObjs[n.id];if(sp){sp.position.copy(n.pos);sp.scale.set(n.sz*spawn,n.sz*spawn,1);sp.material.opacity=vis?spawn:0;sp.material.color.setHex(nodeEffCol[n.id]||n.color);}if(lb){var off=n.sz*.55+n.sz*.62;lb.position.set(n.pos.x,n.pos.y+off*spawn,n.pos.z);var ls=n.sz*1.2*spawn;lb.scale.set(ls*4,ls,1);lb.material.opacity=vis?spawn:0;lb.quaternion.copy(camera.quaternion);}if(hm){hm.position.copy(n.pos);hm.quaternion.copy(camera.quaternion);}});renderer.render(scene,camera);drawLines();}
animate();
</script>
