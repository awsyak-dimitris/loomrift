<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Loomrift</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --bg:#090B12;--canvas:#0B0F17;--surface:#10151E;--elevated:#151B26;
  --hover:#1A2230;--selected:#202A3B;--border:#222B38;--hairline:rgba(255,255,255,0.05);
  --fg:#F5F7FB;--fg2:#8F99AB;--fg3:#5A6373;--fg4:#3A4250;
  --green:#75FF52;--blue:#4FA7FF;--orange:#FFC34D;--purple:#8B5CF6;--danger:#FF5B73;
  --accent:#4FA7FF;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;
  --ease:cubic-bezier(.16,1,.3,1);--dur:200ms;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased}
::selection{background:rgba(79,167,255,0.15);color:var(--blue)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
#wrap{position:relative;width:100vw;height:100vh;overflow:hidden}

/* TOPBAR */
#topbar{display:flex;align-items:center;gap:6px;padding:0 16px;height:48px;background:rgba(11,15,23,0.8);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);z-index:20;position:relative}
#logo-img{height:18px;opacity:0.85;margin-right:8px;flex-shrink:0}
.sep{width:1px;height:16px;background:var(--border);margin:0 4px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;border-radius:var(--r-sm);border:1px solid var(--border);background:transparent;color:var(--fg2);font:500 13px var(--font);cursor:pointer;transition:all var(--dur) var(--ease);white-space:nowrap;flex-shrink:0}
.btn:hover{background:var(--hover);color:var(--fg);border-color:#2a3444}
.btn:active{transform:scale(0.97)}
.btn.active{background:rgba(79,167,255,0.1);border-color:rgba(79,167,255,0.25);color:var(--blue)}
.btn .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.btn svg{flex-shrink:0}
.btn-icon{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:var(--r-sm);border:none;background:transparent;color:var(--fg3);cursor:pointer;transition:all var(--dur)}
.btn-icon:hover{background:var(--hover);color:var(--fg)}
.btn-primary{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);font:500 13px var(--font);cursor:pointer;transition:all var(--dur)}
.btn-primary:hover{filter:brightness(1.1)}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;height:36px;padding:0 12px;width:100%;background:transparent;color:var(--fg2);border:none;border-radius:var(--r-sm);font:500 13px var(--font);cursor:pointer;transition:all var(--dur);text-align:left}
.btn-ghost:hover{background:var(--hover);color:var(--fg)}
.btn-destructive{display:inline-flex;align-items:center;gap:8px;height:36px;padding:0 12px;width:100%;background:rgba(255,91,115,0.08);color:var(--danger);border:1px solid rgba(255,91,115,0.15);border-radius:var(--r-sm);font:500 13px var(--font);cursor:pointer;transition:all var(--dur)}
.btn-destructive:hover{background:rgba(255,91,115,0.14)}
.btn-success{display:inline-flex;align-items:center;gap:8px;height:36px;padding:0 12px;width:100%;background:rgba(117,255,82,0.08);color:var(--green);border:1px solid rgba(117,255,82,0.15);border-radius:var(--r-sm);font:500 13px var(--font);cursor:pointer;transition:all var(--dur)}
.btn-success:hover{background:rgba(117,255,82,0.14)}

/* SIDEBAR */
#sidebar{position:absolute;top:48px;left:0;width:260px;height:calc(100vh - 48px);background:var(--surface);border-right:1px solid var(--border);z-index:15;transform:translateX(-100%);transition:transform 280ms var(--ease);display:flex;flex-direction:column}
#sidebar.open{transform:translateX(0)}
#sb-head{padding:14px 16px 10px;font:600 11px var(--font);color:var(--fg4);letter-spacing:0.08em;text-transform:uppercase;border-bottom:1px solid var(--border);flex-shrink:0}
#sb-scroll{flex:1;overflow-y:auto;padding:4px 0 40px}
.tr{display:flex;align-items:center;height:28px;border-radius:var(--r-sm);margin:1px 6px;padding:0 8px;cursor:pointer;transition:background 150ms}
.tr:hover{background:var(--hover)}
.tr.sel{background:var(--selected)}
.tr-arr{width:14px;height:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--fg4);font-size:8px;transition:transform 150ms}
.tr-arr.shut{transform:rotate(-90deg)}
.tr-ico{width:14px;height:14px;flex-shrink:0;margin:0 4px;display:flex;align-items:center;justify-content:center}
.tr-ico img{width:11px;height:11px;opacity:0.4}
.tr-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-right:6px}
.tr-lbl{font:400 13px var(--font);color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.tr-role{font:400 11px var(--font);color:var(--fg4);margin-left:4px;flex-shrink:0}
.tr-al{font-size:9px;margin-left:4px;flex-shrink:0}
.tc.shut{display:none}

/* RIGHT PANEL — Inspector */
#rpanel{position:absolute;top:48px;right:0;width:300px;height:calc(100vh - 48px);background:var(--surface);border-left:1px solid var(--border);z-index:15;transform:translateX(100%);transition:transform 280ms var(--ease);display:flex;flex-direction:column;overflow-y:auto}
#rpanel.open{transform:translateX(0)}
#rp-close{position:absolute;top:12px;right:12px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;color:var(--fg4);cursor:pointer;border-radius:var(--r-sm);transition:all 150ms;z-index:2}
#rp-close:hover{background:var(--hover);color:var(--fg)}
#rp-av{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:32px auto 12px;font:700 20px var(--font);color:var(--fg);overflow:hidden;border:2px solid var(--border)}
#rp-av img{width:100%;height:100%;object-fit:cover}
#rp-name{font:600 16px/1.4 var(--font);color:var(--fg);text-align:center;padding:0 16px 2px}
#rp-role{font:400 13px var(--font);color:var(--fg2);text-align:center;padding:0 16px 16px}
#rp-sep{height:1px;background:var(--border);margin:0 16px 12px}
.rp-row{display:flex;align-items:center;justify-content:space-between;padding:6px 16px}
.rp-label{font:500 11px var(--font);color:var(--fg4);letter-spacing:0.05em;text-transform:uppercase}
.rp-value{font:400 13px var(--font);color:var(--fg)}
#rp-fields{}
.rp-fsec{padding:10px 16px 4px;font:600 11px var(--font);color:var(--fg4);letter-spacing:0.06em;text-transform:uppercase}
.rp-frow{display:flex;align-items:center;gap:8px;padding:6px 16px;cursor:pointer;border-radius:var(--r-sm);margin:0 4px;transition:background 150ms}
.rp-frow:hover{background:var(--hover)}
.rp-ficon{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.rp-fval{font:400 13px var(--font);color:var(--fg);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rp-fval.empty{color:var(--fg4)}
.rp-fval a{color:var(--blue);text-decoration:none}
#rp-alert-row{padding:4px 16px 8px}
.rp-alert-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--r-sm);font:500 12px var(--font)}
#rp-ai-sec{padding:12px 16px;border-top:1px solid var(--border);margin-top:8px}
#rp-ai-btn{width:100%;height:36px;border-radius:var(--r-sm);background:var(--elevated);border:1px solid var(--border);color:var(--fg2);font:500 13px var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 150ms}
#rp-ai-btn:hover{background:var(--hover);color:var(--fg)}
#rp-ai-result{font:400 13px/1.6 var(--font);color:var(--fg2);padding:10px 0 4px;display:none}
#rp-actions{padding:12px 16px;display:flex;flex-direction:column;gap:6px;border-top:1px solid var(--border);margin-top:auto}

/* CTX MENU */
#ctx{position:absolute;display:none;background:var(--elevated);border:1px solid var(--border);border-radius:var(--r-md);z-index:100;padding:4px;min-width:192px;box-shadow:0 10px 30px rgba(0,0,0,0.5);animation:pop 150ms var(--ease)}
@keyframes pop{from{opacity:0;transform:scale(.95) translateY(-4px)}to{opacity:1;transform:none}}
.ci{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r-sm);font:400 13px var(--font);color:var(--fg);cursor:pointer;transition:background 150ms}
.ci:hover{background:var(--hover)}
.ci.del{color:var(--danger)}
.ci.del:hover{background:rgba(255,91,115,0.08)}
.ci-sep{height:1px;background:var(--border);margin:4px 0}
.ci-head{font:500 11px var(--font);color:var(--fg4);padding:6px 10px 2px;letter-spacing:0.04em;text-transform:uppercase}
.al-row{display:flex;gap:4px;padding:6px 10px;align-items:center}
.al-btn{width:30px;height:30px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--canvas);font:700 13px var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 150ms;color:var(--fg4)}
.al-btn:hover{background:var(--hover);transform:scale(1.05)}
.al-btn.exc{color:var(--orange);border-color:rgba(255,195,77,0.2)}
.al-btn.que{color:var(--blue);border-color:rgba(79,167,255,0.2)}
.al-btn.ast{color:var(--green);border-color:rgba(117,255,82,0.2)}
.al-btn.clr{color:var(--danger);border-color:rgba(255,91,115,0.15)}

/* HINT + TOOLTIP */
#hint{position:absolute;top:60px;left:50%;transform:translateX(-50%);z-index:10;background:rgba(11,15,23,0.75);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:999px;padding:6px 16px;font:400 12px var(--font);color:var(--fg4);pointer-events:none}
#tooltip{position:absolute;display:none;background:var(--elevated);border:1px solid var(--border);border-radius:var(--r-md);padding:8px 12px;pointer-events:none;z-index:30;box-shadow:0 4px 16px rgba(0,0,0,0.4)}
#alert-tip{position:absolute;display:none;z-index:40;pointer-events:none;background:var(--elevated);border:1px solid var(--border);border-radius:var(--r-md);padding:8px 12px;font:400 13px var(--font);color:var(--fg);box-shadow:0 4px 16px rgba(0,0,0,0.4);max-width:220px}

/* CROP */
#crop-ov{position:absolute;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:80;display:none;align-items:center;justify-content:center}
#crop-ov.open{display:flex}
#crop-box{background:var(--elevated);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;width:330px;max-width:94vw;box-shadow:0 20px 60px rgba(0,0,0,0.6);animation:pop 200ms var(--ease)}
#crop-title{padding:14px 16px 10px;font:600 15px var(--font);color:var(--fg);border-bottom:1px solid var(--border)}
#crop-stage{position:relative;width:100%;height:280px;overflow:hidden;background:var(--bg);cursor:grab}
#crop-stage:active{cursor:grabbing}
#crop-img{position:absolute;user-select:none;pointer-events:none}
#crop-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:210px;height:210px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);pointer-events:none;box-shadow:0 0 0 999px rgba(0,0,0,0.55)}
#crop-ctrl{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 16px;border-top:1px solid var(--border)}
.crop-btn{width:36px;height:36px;border-radius:var(--r-sm);background:var(--hover);border:1px solid var(--border);color:var(--fg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background 150ms}
.crop-btn:hover{background:var(--selected)}
#crop-scale-lbl{font:500 12px var(--font);color:var(--fg4);min-width:40px;text-align:center}
#crop-footer{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border)}
#crop-cancel,#crop-confirm{flex:1;height:36px;border-radius:var(--r-sm);font:500 13px var(--font);cursor:pointer;border:none}
#crop-cancel{background:var(--hover);color:var(--fg2)}
#crop-confirm{background:var(--accent);color:#fff}

/* MODAL */
#ov{position:absolute;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);z-index:60;display:none;align-items:center;justify-content:center}
#ov.open{display:flex}
#mdl{background:var(--elevated);border:1px solid var(--border);border-radius:var(--r-xl);padding:24px;width:400px;max-width:94vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.6);animation:pop 250ms var(--ease)}
#mdl h3{font:600 17px var(--font);color:var(--fg);margin-bottom:20px}
.fl{margin-bottom:12px}
.fl label{display:block;font:500 13px var(--font);color:var(--fg2);margin-bottom:6px}
.fl label span{font-weight:400;color:var(--fg4)}
.fl input,.fl select{width:100%;height:40px;background:var(--canvas);border:1px solid var(--border);border-radius:var(--r-sm);padding:0 12px;font:400 14px var(--font);color:var(--fg);outline:none;transition:border 150ms}
.fl input:focus,.fl select:focus{border-color:var(--accent)}
.fl select option{background:var(--elevated)}
.fl input::placeholder{color:var(--fg4)}
#av-drop{width:100%;height:80px;border:1px dashed var(--border);border-radius:var(--r-md);cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--canvas);transition:all 150ms}
#av-drop:hover{border-color:var(--accent);background:rgba(79,167,255,0.05)}
#av-prev{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
#av-prev img{width:68px;height:68px;object-fit:cover;border-radius:50%;border:2px solid var(--border)}
#av-ph{font:400 13px var(--font);color:var(--fg4)}
#av-acts{display:none;margin-top:6px}
.av-clr{background:transparent;border:1px solid var(--border);border-radius:var(--r-sm);padding:4px 12px;font:400 12px var(--font);color:var(--fg4);cursor:pointer}
.av-clr:hover{border-color:var(--danger);color:var(--danger)}
.mbs{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}

/* UI RAIL */
#ui-rail{position:fixed;left:0;top:48px;bottom:0;width:56px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:24px;gap:12px;z-index:26;pointer-events:none}
#fab{width:44px;height:44px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;transition:all 150ms;pointer-events:all;box-shadow:0 4px 16px rgba(79,167,255,0.3)}
#fab:hover{filter:brightness(1.15);transform:scale(1.06)}
#rst-btn{width:36px;height:36px;border-radius:50%;background:var(--elevated);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 200ms;padding:0;pointer-events:all;color:var(--fg4)}
#rst-btn:hover{background:rgba(255,91,115,0.08);border-color:var(--danger);color:var(--danger);transform:rotate(30deg)}
#rst-btn img{width:16px;height:16px;opacity:0.5}
#rst-btn:hover img{opacity:0.9}
#save-ind{position:fixed;bottom:86px;left:62px;font:500 12px var(--font);color:var(--green);pointer-events:none;z-index:27;opacity:0;transition:opacity 300ms}
#save-ind.show{opacity:1}

/* CANVASES */
#lc{position:absolute;top:48px;left:0;pointer-events:none;z-index:1}
#c{position:absolute;top:48px;left:0;display:block;z-index:2}
.touch-hint{position:absolute;pointer-events:none;z-index:50;border-radius:50%;border:2px solid rgba(255,255,255,0.25);animation:th 500ms ease-out forwards}
@keyframes th{from{transform:scale(0);opacity:1}to{transform:scale(1.5);opacity:0}}
@media(max-width:640px){
  #topbar{gap:3px;padding:0 8px;overflow-x:auto;scrollbar-width:none}
  #topbar::-webkit-scrollbar{display:none}
  .btn{height:28px;padding:0 8px;font-size:12px}
  #sidebar{width:240px}#rpanel{width:100%}
  #fab{width:40px;height:40px}
  #mdl{width:96vw;padding:16px}
}
</style>
</head>

// ===== LAYOUT =====
function getSubW(id,depth){
  var n=nodeMap[id];
  if(!expN.has(id)||!n.children.length)return Math.max(n.sz*2.2+8,48);
  var t=0;n.children.forEach(function(c){t+=getSubW(c.id,depth+1)+6;});
  return Math.max(t-6,n.sz*2.2+8);
}
function placeTree(id,cx,cy,cz,depth,pAngle){
  var n=nodeMap[id];n.targetPos.set(cx,cy,cz);
  if(!expN.has(id)||!n.children.length)return;
  var kids=n.children,nk=kids.length;
  if(is2D){
    var ws=kids.map(function(c){return getSubW(c.id,depth+1);});
    var tw=ws.reduce(function(a,b){return a+b;},0)+(nk-1)*8;
    var x=-tw/2;var ys=-(70+n.sz*1.4);
    kids.forEach(function(c,i){placeTree(c.id,cx+x+ws[i]/2,cy+ys,0,depth+1,0);x+=ws[i]+8;});
  } else {
    var RADII=[0,200,140,95,68,50,38];
    var SPREADS=[0,1.5*Math.PI,1.2*Math.PI,1.0*Math.PI,0.85*Math.PI,0.7*Math.PI,0.6*Math.PI];
    var YDROPS=[0,-72,-62,-52,-42,-34,-26];
    var ZFACS=[0,0.45,0.35,0.25,0.16,0.1,0.05];
    var r=RADII[Math.min(depth,6)];
    var spread=SPREADS[Math.min(depth,6)];
    var yDrop=YDROPS[Math.min(depth,6)];
    var zFac=ZFACS[Math.min(depth,6)];
    kids.forEach(function(c,i){
      var f=nk===1?0.5:i/(nk-1);
      var angle=pAngle-spread/2+f*spread;
      placeTree(c.id,cx+Math.cos(angle)*r,cy+yDrop,cz+Math.sin(angle)*r*zFac,depth+1,angle);
    });
  }
}
function resolveCollisions(){
  var ns2=Object.values(nodeMap).filter(function(n){return visN.has(n.id);});
  for(var it=0;it<5;it++){
    for(var i=0;i<ns2.length;i++){for(var j=i+1;j<ns2.length;j++){
      var a=ns2[i],b=ns2[j];
      var minD=(a.sz+b.sz)*0.6+20;
      var dx=b.targetPos.x-a.targetPos.x,dy=b.targetPos.y-a.targetPos.y,dz=b.targetPos.z-a.targetPos.z;
      var d2=dx*dx+dy*dy+dz*dz;
      if(d2<minD*minD&&d2>0.0001){
        var d=Math.sqrt(d2),push=(minD-d)/d;
        a.targetPos.x-=dx*push*0.5;a.targetPos.z-=dz*push*0.5;
        b.targetPos.x+=dx*push*0.5;b.targetPos.z+=dz*push*0.5;
      }
    }}
  }
}
function calcPos(){
  var roots=Object.values(nodeMap).filter(function(n){return !n.parentId;});
  if(is2D){
    var rws=roots.map(function(r){return getSubW(r.id,1)+40;});
    var tw=rws.reduce(function(a,b){return a+b;},0);
    var x=-tw/2;
    roots.forEach(function(r,i){placeTree(r.id,x+rws[i]/2,170,0,1,-Math.PI/2);x+=rws[i];});
  } else {
    var n2=roots.length;
    roots.forEach(function(r,i){
      var cx,cy=60,cz,angle;
      if(n2===1){cx=0;cz=0;angle=-Math.PI/2;}
      else{var sp=Math.min(Math.PI*1.8,n2*0.9),a=(-Math.PI/2)-sp/2+(i/(n2-1))*sp,dist=Math.max(320,n2*90);cx=Math.cos(a)*dist;cz=Math.sin(a)*dist*0.25;angle=a;}
      placeTree(r.id,cx,cy,cz,1,angle);
    });
  }
  resolveCollisions();
}

var imgC={},avC={};
function mkTex(n,isAct,colOvr){
  var sz2=128;var cv2=document.createElement("canvas");cv2.width=sz2;cv2.height=sz2;
  var ctx2=cv2.getContext("2d");ctx2.clearRect(0,0,sz2,sz2);
  var col=colOvr!==undefined?colOvr:(effCol[n.id]||n.color);
  var rgb=h2r(col),r=rgb[0],g=rgb[1],b=rgb[2];
  // AVATAR path
  if(n.avatar){
    var avKey=n.id;
    if(!avC[avKey]||avC[avKey]._src!==n.avatar){
      var avImg=new Image();avImg._src=n.avatar;avImg.src=n.avatar;avC[avKey]=avImg;
    }
    var avI=avC[avKey];
    ctx2.save();ctx2.beginPath();ctx2.arc(sz2/2,sz2/2,sz2/2-2,0,Math.PI*2);ctx2.clip();
    if(avI.complete&&avI.naturalWidth){ctx2.drawImage(avI,0,0,sz2,sz2);}
    else{ctx2.fillStyle="rgba("+r+","+g+","+b+",1)";ctx2.fillRect(0,0,sz2,sz2);
      avI.onload=function(){if(sprO[n.id]){sprO[n.id].material.map=mkTex(n,isAct,colOvr);sprO[n.id].material.needsUpdate=true;}};}
    ctx2.restore();
    ctx2.strokeStyle="rgba("+r+","+g+","+b+",1)";ctx2.lineWidth=sz2*0.075;
    ctx2.beginPath();ctx2.arc(sz2/2,sz2/2,sz2/2-sz2*0.04,0,Math.PI*2);ctx2.stroke();
    return new THREE.CanvasTexture(cv2);
  }
  // SVG ICON path
  var sk=n.shape==="hexagon"?"triangle":(n.shape==="main"?"main":n.shape);if(!ICONS[sk])sk="circle";
  var iurl=ICONS[sk][isAct?"a":"d"];var img2=imgC[iurl];
  if(img2){
    // Draw SVG icon colored
    ctx2.drawImage(img2,0,0,sz2,sz2);
    ctx2.globalCompositeOperation="source-in";
    ctx2.fillStyle="rgba("+r+","+g+","+b+",1)";
    ctx2.fillRect(0,0,sz2,sz2);
    ctx2.globalCompositeOperation="source-over";
    // Add semi-transparent fill overlay
    ctx2.globalAlpha=0.3;
    ctx2.fillStyle="rgba("+r+","+g+","+b+",1)";
    if(sk==="circle"||sk==="main"){ctx2.beginPath();ctx2.arc(sz2/2,sz2/2,sz2/2-4,0,Math.PI*2);ctx2.fill();}
    else if(sk==="triangle"){ctx2.beginPath();ctx2.moveTo(sz2/2,6);ctx2.lineTo(6,sz2-6);ctx2.lineTo(sz2-6,sz2-6);ctx2.closePath();ctx2.fill();}
    else if(sk==="square"){ctx2.fillRect(8,8,sz2-16,sz2-16);}
    else if(sk==="star"){var c2=sz2/2,ro2=sz2/2-5,ri2=ro2*0.42;ctx2.beginPath();for(var si=0;si<10;si++){var sa=-Math.PI/2+si*Math.PI/5,sRad=si%2===0?ro2:ri2;ctx2.lineTo(c2+sRad*Math.cos(sa),c2+sRad*Math.sin(sa));}ctx2.closePath();ctx2.fill();}
    ctx2.globalAlpha=1.0;
  } else {
    ctx2.strokeStyle="rgba("+r+","+g+","+b+",1)";ctx2.lineWidth=4;
    ctx2.beginPath();ctx2.arc(sz2/2,sz2/2,sz2/2-6,0,Math.PI*2);ctx2.stroke();
  }
  return new THREE.CanvasTexture(cv2);
}

var pCv=document.createElement("canvas");pCv.width=128;pCv.height=128;

}
function setMode(m){curMode=m;hlGrp.clear();document.querySelectorAll(".tbtn").forEach(function(b,i){b.classList.toggle("active",i+1===m);});applyMode(m===2?lastCId:null);}
function updateHint(){var mob=navigator.maxTouchPoints>0;document.getElementById("hint").textContent=mob?(is2D?"1 палец = панорама · 2 = зум · долго = меню":"1 палец = вращение · 2 = зум · долго = меню"):(is2D?"Пробел+ЛКМ = панорама · колесо = зум · ПКМ = меню":"ЛКМ = вращение · Пробел+ЛКМ = панорама · колесо = зум · ПКМ = меню");}
function toggleView(){is2D=!is2D;var btn=document.getElementById("viewBtn");btn.textContent=is2D?"🔮 3D":"⬛ 2D";btn.classList.toggle("active",is2D);tPan.set(0,0,0);tSph.theta=0;tSph.phi=Math.PI/2;tSph.r=is2D?580:420;calcPos();updateHint();}

function hideSub(id){var n=nodeMap[id];if(!n)return;visN.delete(id);expN.delete(id);n.opacity=0;n.children.forEach(function(c){hideSub(c.id);});}
function toggleNode(id){
  var n=nodeMap[id];if(!n||!n.children.length)return;
  if(expN.has(id)){expN.delete(id);n.children.forEach(function(c){hideSub(c.id);});}
  else{expN.add(id);var now=performance.now()/1000;n.children.forEach(function(c,i){visN.add(c.id);nodeMap[c.id].opacity=1;nodeMap[c.id].birthTime=now+i*.06;});}
  calcPos();rebuildEdges();selId=id;rfx(id,true);pulPh=0;pulAct=true;pulPause=0;scheduleSave();
}
function buildPath(id){
  var path=[],cur=nodeMap[id];while(cur){path.unshift(cur.id);cur=cur.parentId?nodeMap[cur.parentId]:null;}
  var vis=path.filter(function(nid){return visN.has(nid);});if(vis.length<2)return;
  var edges=[];for(var i=1;i<vis.length;i++)edges.push({from:vis[i-1],to:vis[i]});
  pathAnim={active:true,nodes:vis,edges:edges,timer:0};dotProgress=0;
}
function handleClick(id){
  lastCId=id;selId=id;revealInSB(id);openRP(id);
  var n=nodeMap[id];tPan.set(n.targetPos.x,n.targetPos.y,0);
  if(curMode===3){var grp=n.group;if(grp){if(hlGrp.has(grp))hlGrp.delete(grp);else hlGrp.add(grp);}toggleNode(id);applyMode(null);}
  else{toggleNode(id);applyMode(curMode===2?id:null);}
  var atBottom=!n.children.length||(expN.has(id)&&n.children.every(function(c){return expN.has(c.id)||!c.children.length;}));
  if(atBottom)buildPath(id);
  buildSB();
}

// ===== PRELOAD & INIT =====
var toLoad=[];
Object.values(ICONS).forEach(function(ic){toLoad.push(ic.d);toLoad.push(ic.a);});
toLoad=Array.from(new Set(toLoad));
var loaded=0;
function onImgDone(){loaded++;if(loaded===toLoad.length)init();}
toLoad.forEach(function(url){var img2=new Image();img2.onload=img2.onerror=function(){imgC[url]=(img2.complete&&img2.naturalWidth>0)?img2:null;onImgDone();};img2.src=url;});

function init(){
  var hadSave=false;
  try{hadSave=loadState();}catch(e){console.warn("loadState err:",e);hadSave=false;}
  if(!nodeMap["mixa"]){console.warn("No mixa, using default");hadSave=false;}
  else{Object.values(nodeMap).forEach(function(n){if(!n.parentId){visN.add(n.id);n.opacity=1;}});}
  Object.values(nodeMap).forEach(mkSprite);
  if(hadSave){document.querySelectorAll(".tbtn").forEach(function(b,i){b.classList.toggle("active",i+1===curMode);});if(is2D){document.getElementById("viewBtn").textContent="🔮 3D";document.getElementById("viewBtn").classList.add("active");tSph.theta=0;tSph.phi=Math.PI/2;tSph.r=580;}}
  calcPos();rebuildEdges();scene.add(new THREE.AmbientLight(0xffffff,1));
  applyMode(null);buildSB();updateHint();animate();
}

// ===== INPUT =====
var isDrag=false,isPan=false,spDown=false,lastX=0,lastY=0,moved=false;
var ray=new THREE.Raycaster(),mouse=new THREE.Vector2();
var tip=document.getElementById("tooltip"),alTip=document.getElementById("alert-tip"),lastT=performance.now()/1000;

window.addEventListener("keydown",function(e){if(e.code==="Space"){spDown=true;e.preventDefault();}});
window.addEventListener("keyup",function(e){if(e.code==="Space")spDown=false;});
canvas.addEventListener("mousedown",function(e){moved=false;lastX=e.clientX;lastY=e.clientY;if(e.button===1){isPan=true;e.preventDefault();}else if(e.button===0){if(spDown||is2D)isPan=true;else isDrag=true;}canvas.style.cursor=isPan?"move":"grabbing";});
window.addEventListener("mouseup",function(){isDrag=false;isPan=false;canvas.style.cursor=spDown||is2D?"move":"grab";});
window.addEventListener("mousemove",function(e){
  var dx=e.clientX-lastX,dy=e.clientY-lastY;if(Math.abs(dx)>1||Math.abs(dy)>1)moved=true;
  if(isPan){var sc=tSph.r/700;tPan.x-=dx*sc;tPan.y+=dy*sc;}
  else if(isDrag&&!is2D){tSph.theta-=dx*.006;tSph.phi=Math.max(.05,Math.min(Math.PI-.05,tSph.phi+dy*.006));}
  lastX=e.clientX;lastY=e.clientY;
  var rect=canvas.getBoundingClientRect();mouse.x=((e.clientX-rect.left)/W)*2-1;mouse.y=-((e.clientY-rect.top)/H)*2+1;
  ray.setFromCamera(mouse,camera);
  var hit=ray.intersectObjects(Object.values(hitO).filter(function(m){return visN.has(m.userData.id);}));
  var newH=hit.length?hit[0].object.userData.id:null;
  if(newH!==hovId){if(hovId&&hovId!==selId)rfx(hovId,false);hovId=newH;if(hovId&&hovId!==selId)rfx(hovId,true);}
  if(newH&&!isPan){
    var n=nodeMap[newH];
    if(n.alert){var at=AL[n.alert.type];if(at){alTip.style.display="block";alTip.style.left=(e.clientX+14)+"px";alTip.style.top=(e.clientY-50)+"px";alTip.style.borderColor=at.col+"55";alTip.innerHTML="<span style='font-size:14px;font-weight:700;color:"+at.col+"'>"+at.sym+"</span> "+(n.alert.text||at.label);}}else alTip.style.display="none";
    tip.style.display="block";tip.style.left=(e.clientX+14)+"px";tip.style.top=(e.clientY+20)+"px";
    var alHint=n.alert?(function(){var at2=AL[n.alert.type];return at2?"<div style='margin-top:4px;font-size:10px;color:"+at2.col+"'>"+at2.sym+" "+(n.alert.text||at2.label)+"</div>":""}()):"";
    tip.innerHTML="<div style='font-weight:500;font-size:12px;color:#dde2f0'>"+n.label+"</div><div style='color:#5a6070;font-size:10px;margin-top:2px'>"+n.role+"</div>"+(n.children.length?"<div style='color:#8ab8e8;font-size:10px;margin-top:3px'>"+(expN.has(n.id)?"▲ схлопнуть":"▼ раскрыть")+"</div>":"")+alHint+"<div style='color:#3a4050;font-size:9px;margin-top:3px'>ПКМ = меню</div>";
    canvas.style.cursor="pointer";
  } else if(!isPan&&!isDrag){tip.style.display="none";alTip.style.display="none";canvas.style.cursor=spDown||is2D?"move":"grab";}
});
canvas.addEventListener("contextmenu",function(e){e.preventDefault();var rect=canvas.getBoundingClientRect();mouse.x=((e.clientX-rect.left)/W)*2-1;mouse.y=-((e.clientY-rect.top)/H)*2+1;ray.setFromCamera(mouse,camera);var hit=ray.intersectObjects(Object.values(hitO).filter(function(m){return visN.has(m.userData.id);}));if(hit.length)showCtx(hit[0].object.userData.id,e.clientX,e.clientY);});
canvas.addEventListener("wheel",function(e){e.preventDefault();tSph.r=Math.max(80,Math.min(1200,tSph.r+e.deltaY*.5));},{passive:false});
canvas.addEventListener("click",function(e){if(moved||isPan||spDown)return;var rect=canvas.getBoundingClientRect();mouse.x=((e.clientX-rect.left)/W)*2-1;mouse.y=-((e.clientY-rect.top)/H)*2+1;ray.setFromCamera(mouse,camera);var hit=ray.intersectObjects(Object.values(hitO).filter(function(m){return visN.has(m.userData.id);}));if(hit.length)handleClick(hit[0].object.userData.id);});

// Touch
var _t0=null,_tMv=false,_tLong=null,_tPD=0,_tLastTap=0,_tLastId=null;
canvas.addEventListener("touchstart",function(e){e.preventDefault();if(e.touches.length===1){var p=e.touches[0];_tMv=false;var tx=p.clientX,ty=p.clientY;_tLong=setTimeout(function(){var rect=canvas.getBoundingClientRect();mouse.x=((tx-rect.left)/W)*2-1;mouse.y=-((ty-rect.top)/H)*2+1;ray.setFromCamera(mouse,camera);var hit=ray.intersectObjects(Object.values(hitO).filter(function(m){return visN.has(m.userData.id);}));if(hit.length)showCtx(hit[0].object.userData.id,tx,Math.min(ty,window.innerHeight-210));},500);lastX=p.clientX;lastY=p.clientY;isDrag=true;}else if(e.touches.length===2){clearTimeout(_tLong);isDrag=false;isPan=true;_tPD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);lastX=(e.touches[0].clientX+e.touches[1].clientX)/2;lastY=(e.touches[0].clientY+e.touches[1].clientY)/2;}},{passive:false});
canvas.addEventListener("touchmove",function(e){e.preventDefault();if(e.touches.length===1){clearTimeout(_tLong);_tMv=true;var p=e.touches[0];var dx=p.clientX-lastX,dy=p.clientY-lastY;if(is2D){var sc=tSph.r/700;tPan.x-=dx*sc;tPan.y+=dy*sc;}else{tSph.theta-=dx*.005;tSph.phi=Math.max(.05,Math.min(Math.PI-.05,tSph.phi+dy*.005));}lastX=p.clientX;lastY=p.clientY;}else if(e.touches.length===2){var nd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);tSph.r=Math.max(80,Math.min(1200,tSph.r+(_tPD-nd)*2));_tPD=nd;var mx=(e.touches[0].clientX+e.touches[1].clientX)/2,my=(e.touches[0].clientY+e.touches[1].clientY)/2;var sc=tSph.r/700;tPan.x-=(mx-lastX)*sc;tPan.y+=(my-lastY)*sc;lastX=mx;lastY=my;}},{passive:false});
canvas.addEventListener("touchend",function(e){e.preventDefault();clearTimeout(_tLong);if(!_tMv&&e.changedTouches.length===1){var tc=e.changedTouches[0];var rect=canvas.getBoundingClientRect();mouse.x=((tc.clientX-rect.left)/W)*2-1;mouse.y=-((tc.clientY-rect.top)/H)*2+1;ray.setFromCamera(mouse,camera);var hit=ray.intersectObjects(Object.values(hitO).filter(function(m){return visN.has(m.userData.id);}));if(hit.length){var hid=hit[0].object.userData.id;var now2=Date.now();if(hid===_tLastId&&now2-_tLastTap<350)showCtx(hid,tc.clientX,Math.min(tc.clientY,window.innerHeight-210));else handleClick(hid);_tLastTap=now2;_tLastId=hid;}else hideCtx();}isDrag=false;isPan=false;},{passive:false});

// ===== RENDER =====
function s2c(s,pan){return new THREE.Vector3(pan.x+s.r*Math.sin(s.phi)*Math.sin(s.theta),pan.y+s.r*Math.cos(s.phi),s.r*Math.sin(s.phi)*Math.cos(s.theta));}
function proj(p3){var v=p3.clone();v.project(camera);return{x:(v.x*.5+.5)*W,y:(-.5*v.y+.5)*H};}
function scrRad(n){var e3=n.pos.clone().add(new THREE.Vector3(n.sz*.5,0,0));var c2=proj(n.pos),e2=proj(e3);return Math.sqrt((e2.x-c2.x)*(e2.x-c2.x)+(e2.y-c2.y)*(e2.y-c2.y));}
function shorten(ax,ay,bx,by,amt){var dx=bx-ax,dy=by-ay,d=Math.sqrt(dx*dx+dy*dy);if(d<amt*2)return{x:ax,y:ay};var t=amt/d;return{x:ax+dx*t,y:ay+dy*t};}

function getPathPts(){var pts=[];pathAnim.nodes.forEach(function(nid){if(visN.has(nid)&&nodeMap[nid])pts.push(proj(nodeMap[nid].pos));});return pts;}
function pathLen(pts){var l=0;for(var i=1;i<pts.length;i++){var dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y;l+=Math.sqrt(dx*dx+dy*dy);}return l;}
function posOnPath(pts,t){var tot=pathLen(pts),tgt=t*tot,acc=0;for(var i=1;i<pts.length;i++){var dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y,seg=Math.sqrt(dx*dx+dy*dy);if(acc+seg>=tgt){var f=(tgt-acc)/seg;return{x:pts[i-1].x+dx*f,y:pts[i-1].y+dy*f};}acc+=seg;}return pts[pts.length-1]||{x:0,y:0};}
function pathCol(){if(!pathAnim.nodes.length)return[128,180,255];var lastId=pathAnim.nodes[pathAnim.nodes.length-1];return h2r(curMode===4?MONO:(effCol[lastId]||nodeMap[lastId].color||0x3a7ad0));}

function drawFrame(dt){
  lctx.putImageData(gridSnap,0,0);
  // Update path
  var pathPts=[],pc=[128,180,255];
  if(pathAnim.active&&pathAnim.nodes.length>=2){pathAnim.timer+=dt;if(pathAnim.timer>=PATH_INT)pathAnim.timer=0;pathPts=getPathPts();pc=pathCol();dotProgress=pathAnim.timer<PATH_DUR?pathAnim.timer/PATH_DUR:1;}
  // Base edges
  edgeData.forEach(function(e){
    var n=nodeMap[e.nid],p=nodeMap[e.pid];if(!n||!p||!visN.has(e.nid)||!visN.has(e.pid))return;
    var ec=curMode===4?MONO:(effCol[e.nid]||n.color);var rgb=h2r(ec);
    var a2=proj(n.pos),b2=proj(p.pos);var rN=scrRad(n)*1.05,rP=scrRad(p)*1.05;
    var sp2=shorten(a2.x,a2.y,b2.x,b2.y,rN),ep2=shorten(b2.x,b2.y,a2.x,a2.y,rP);
    lctx.beginPath();if(e.lvl>=4)lctx.setLineDash([5,9]);else lctx.setLineDash([]);
    lctx.moveTo(sp2.x,sp2.y);lctx.lineTo(ep2.x,ep2.y);
    var alFlt=alertFilter===null?1:(nodeMap[e.nid].alert&&nodeMap[e.nid].alert.type===alertFilter?1:0.08);
    lctx.strokeStyle="rgba("+rgb[0]+","+rgb[1]+","+rgb[2]+","+(curMode===4?0.25:0.48)*alFlt+")";
    lctx.lineWidth=1.8;lctx.lineCap="round";lctx.stroke();lctx.setLineDash([]);
  });
  // Path animation
  if(pathPts.length>=2&&dotProgress>0){
    var pr=pc[0],pg=pc[1],pb=pc[2];
    var tot=pathLen(pathPts),reached=dotProgress*tot,flk=0.7+Math.sin(performance.now()*0.018)*0.3;
    var acc=0;
    for(var i=1;i<pathPts.length;i++){
      var dx=pathPts[i].x-pathPts[i-1].x,dy=pathPts[i].y-pathPts[i-1].y,seg=Math.sqrt(dx*dx+dy*dy);
      if(acc>=reached)break;var dl=Math.min(seg,reached-acc);var fx=pathPts[i-1].x+(dx/seg)*dl,fy=pathPts[i-1].y+(dy/seg)*dl;
      var doff=((performance.now()*0.12)%24);
      lctx.save();lctx.setLineDash([10,14]);lctx.lineDashOffset=-doff;lctx.beginPath();lctx.moveTo(pathPts[i-1].x,pathPts[i-1].y);lctx.lineTo(fx,fy);
      lctx.strokeStyle="rgba("+pr+","+pg+","+pb+","+(0.55+flk*0.35)+")";lctx.lineWidth=2.8;lctx.lineCap="round";lctx.stroke();lctx.setLineDash([]);lctx.restore();acc+=seg;
    }
    var dp=posOnPath(pathPts,dotProgress);var dR=4+flk*2;
    lctx.save();var grd=lctx.createRadialGradient(dp.x,dp.y,0,dp.x,dp.y,dR*4);grd.addColorStop(0,"rgba("+pr+","+pg+","+pb+","+(flk*0.4)+")");grd.addColorStop(1,"rgba("+pr+","+pg+","+pb+",0)");lctx.fillStyle=grd;lctx.beginPath();lctx.arc(dp.x,dp.y,dR*4,0,Math.PI*2);lctx.fill();lctx.fillStyle="rgba("+pr+","+pg+","+pb+","+(0.7+flk*0.3)+")";lctx.beginPath();lctx.arc(dp.x,dp.y,dR,0,Math.PI*2);lctx.fill();lctx.fillStyle="rgba(255,255,255,"+(0.7+flk*0.3)+")";lctx.beginPath();lctx.arc(dp.x,dp.y,dR*0.4,0,Math.PI*2);lctx.fill();lctx.restore();
    if(pathPts.length){var s0=pathPts[0];lctx.save();lctx.strokeStyle="rgba("+pr+","+pg+","+pb+",0.5)";lctx.lineWidth=1.5;lctx.beginPath();lctx.arc(s0.x,s0.y,5,0,Math.PI*2);lctx.stroke();lctx.restore();var sE=pathPts[pathPts.length-1];lctx.save();lctx.strokeStyle="rgba("+pr+","+pg+","+pb+","+(0.6+flk*0.3)+")";lctx.lineWidth=2;lctx.beginPath();lctx.arc(sE.x,sE.y,6+flk*4,0,Math.PI*2);lctx.stroke();lctx.restore();}
  }
  // Alert badges
  Object.values(nodeMap).forEach(function(n){
    if(!n.alert||!visN.has(n.id))return;var at=AL[n.alert.type];if(!at)return;
    var np=proj(n.pos),sr=scrRad(n),bsz=Math.max(6,sr*0.46);
    var bx=np.x+sr*1.35,by=np.y-sr*1.35;
    var pulse=0.82+Math.sin(performance.now()*0.004)*0.18;
    lctx.save();
    lctx.fillStyle=at.bg;lctx.beginPath();lctx.arc(bx,by,bsz,0,Math.PI*2);lctx.fill();
    lctx.strokeStyle=at.col;lctx.lineWidth=1.2;lctx.beginPath();lctx.arc(bx,by,bsz,0,Math.PI*2);lctx.stroke();
    lctx.fillStyle=at.col;lctx.font="bold "+Math.round(bsz*1.05)+"px sans-serif";lctx.textAlign="center";lctx.textBaseline="middle";lctx.fillText(at.sym,bx,by+1);lctx.restore();
  });
  // Labels
  var FONT="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif";
  var labelNodes=[];
  Object.values(nodeMap).forEach(function(n){
    if(!visN.has(n.id))return;var np=proj(n.pos);
    if(np.x<-200||np.x>W+200||np.y<-100||np.y>H+100)return;
    var sr=scrRad(n);if(sr<2)return;
    var flt=alertFilter===null?1:((n.alert&&n.alert.type===alertFilter)?1:0.08);
    var spawnA=1;if(n.birthTime>0){var age=lastT-n.birthTime;if(age<0)return;if(age<0.4)spawnA=age/0.4;}
    var srA=Math.max(0,Math.min(1,(sr-3)/5));var alpha=spawnA*flt*srA;if(alpha<0.02)return;
    var nameSize=Math.max(10,Math.min(15,sr*1.0));var roleSize=Math.max(8,Math.min(11,sr*0.68));
    labelNodes.push({n:n,np:np,sr:sr,alpha:alpha,ns:nameSize,rs:roleSize});
  });
  labelNodes.sort(function(a,b){return b.n.pos.z-a.n.pos.z;});
  labelNodes.forEach(function(item){
    var n=item.n,np=item.np,sr=item.sr;
    var ec=curMode===4?MONO:(effCol[n.id]||n.color);var rgb=h2r(ec);
    var gap=sr+Math.max(6,sr*0.28);
    var nameY=np.y-gap;var roleY=nameY-item.ns-2;var tx=np.x;
    lctx.save();lctx.globalAlpha=item.alpha;lctx.textAlign="center";
    lctx.font=item.rs+"px "+FONT;lctx.textBaseline="bottom";
    lctx.fillStyle="rgba(0,0,0,0.9)";lctx.fillText(n.role,tx+1,roleY+1);lctx.fillText(n.role,tx-1,roleY+1);
    lctx.fillStyle="rgba("+rgb[0]+","+rgb[1]+","+rgb[2]+",0.92)";lctx.fillText(n.role,tx,roleY);
    lctx.font="600 "+item.ns+"px "+FONT;
    lctx.fillStyle="rgba(0,0,0,0.9)";lctx.fillText(n.label,tx+1,nameY+1);lctx.fillText(n.label,tx-1,nameY+1);
    lctx.fillStyle=curMode===4?"rgba(200,205,212,1)":"rgba(232,237,248,1)";lctx.fillText(n.label,tx,nameY);
    lctx.restore();
  });
}

function animate(){
  requestAnimationFrame(animate);
  var now=performance.now()/1000,dt=Math.min(now-lastT,.05);lastT=now;
  if(is2D){tSph.theta=0;tSph.phi=Math.PI/2;}
  sph.theta+=(tSph.theta-sph.theta)*.07;sph.phi+=(tSph.phi-sph.phi)*.07;sph.r+=(tSph.r-sph.r)*.07;
  panOff.lerp(tPan,.09);
  var cp=s2c(sph,panOff);camera.position.copy(cp);camera.lookAt(panOff.x,panOff.y,0);camera.up.set(0,1,0);
  if(selId&&visN.has(selId)){
    if(pulAct){pulPh+=dt/PDUL;if(pulPh>=1){pulPh=1;pulAct=false;pulPause=PPAUSE;}}
    else{pulPause-=dt;if(pulPause<=0){pulPh=0;pulAct=true;}}
    drawPulse(effCol[selId]||nodeMap[selId].color,pulPh);
    var sn=nodeMap[selId];pSp.position.copy(sn.pos);pSp.scale.set(sn.sz*5,sn.sz*5,1);pMat.opacity=.88;
  } else{pCv.getContext("2d").clearRect(0,0,128,128);pTex.needsUpdate=true;pMat.opacity=0;}
  Object.values(nodeMap).forEach(function(n){
    n.pos.lerp(n.targetPos,.09);var vis=visN.has(n.id),spawn=1;
    if(vis&&n.birthTime>0){var age=now-n.birthTime;if(age<0)spawn=0;else if(age<.4){var tt=age/.4,sv=1.7;spawn=Math.max(0,Math.min(1,tt*tt*((sv+1)*tt-sv)));}}
    var sp=sprO[n.id],hm=hitO[n.id];
    if(sp){sp.position.copy(n.pos);sp.scale.set(n.sz*spawn,n.sz*spawn,1);sp.material.opacity=vis?spawn:0;}
    if(hm){hm.position.copy(n.pos);hm.quaternion.copy(camera.quaternion);}
  });
  renderer.render(scene,camera);drawFrame(dt);
}
