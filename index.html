<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Loomrift</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#12141a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
#wrap{position:relative;width:100vw;height:100vh;background:#12141a;overflow:hidden}
#topbar{display:flex;align-items:center;gap:4px;padding:0 12px;height:46px;background:#1a1d26;border-bottom:0.5px solid #2a2d3a;z-index:20;position:relative}
#logo-img{height:18px;width:auto;margin-right:4px;opacity:0.9;flex-shrink:0}
.sep{width:0.5px;height:18px;background:#2a2d3a;margin:0 2px;flex-shrink:0}
.tbtn{display:flex;align-items:center;gap:4px;padding:4px 9px;border-radius:20px;border:0.5px solid #2e3140;background:transparent;color:#5a6070;font-size:11px;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0}
.tbtn .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tbtn:hover{border-color:#3a3f52;color:#9aa0b4}
.tbtn.active{background:#1e2436;border-color:#3a5080;color:#8ab8e8}
.view-btn{padding:4px 9px;border-radius:20px;border:0.5px solid #2e3140;background:transparent;color:#5a6070;font-size:11px;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0}
.view-btn:hover{border-color:#3a3f52;color:#9aa0b4}
.view-btn.active{background:#2a1e36;border-color:#6a3a80;color:#c08ae8}
.view-btn.xpbtn{border-color:#2e4a2e;color:#4a8a4a}
.view-btn.xpbtn:hover{color:#80B932;border-color:#3a6a3a}
#burger{width:28px;height:28px;display:flex;flex-direction:column;justify-content:center;gap:4px;cursor:pointer;padding:4px;border-radius:6px;flex-shrink:0;border:none;background:transparent}
#burger:hover{background:rgba(255,255,255,0.06)}
#burger span{display:block;height:1.5px;background:#8a92a8;border-radius:2px}
#sidebar{position:absolute;top:46px;left:0;width:256px;height:calc(100vh - 46px);background:#161820;border-right:0.5px solid #2a2d3a;z-index:15;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
#sidebar.open{transform:translateX(0)}
#sb-head{padding:12px 14px 8px;font-size:10px;font-weight:600;color:#5a6070;letter-spacing:.12em;text-transform:uppercase;border-bottom:0.5px solid #2a2d3a;flex-shrink:0}
#sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 0 32px}
#sb-scroll::-webkit-scrollbar{width:3px}
#sb-scroll::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:2px}
.tr{display:flex;align-items:center;height:24px;cursor:pointer;border-radius:5px;margin:1px 6px;padding-right:6px;user-select:none;transition:background .1s}
.tr:hover{background:rgba(255,255,255,0.05)}
.tr.sel{background:rgba(58,122,208,0.2);border:0.5px solid rgba(58,122,208,0.3)}
.tr-arr{width:14px;height:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:8px;color:#4a5060;transition:transform .15s;margin-left:2px}
.tr-arr.shut{transform:rotate(-90deg)}
.tr-ico{width:13px;height:13px;flex-shrink:0;margin:0 4px;display:flex;align-items:center;justify-content:center}
.tr-ico img{width:11px;height:11px;object-fit:contain;opacity:0.6}
.tr-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-right:5px}
.tr-lbl{font-size:11.5px;color:#c0c8d8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.tr-role{font-size:9.5px;color:#3a4050;margin-left:3px;white-space:nowrap;flex-shrink:0}
.tr-al{font-size:9px;margin-left:3px;flex-shrink:0}
.tc.shut{display:none}
.view-btn.al-active{background:#2a1e36;border-color:#EFC44E;color:#EFC44E}
#hint{position:absolute;top:56px;left:50%;transform:translateX(-50%);z-index:10;background:rgba(22,24,31,0.85);border:0.5px solid #2e3140;border-radius:10px;padding:4px 14px;font-size:10px;color:#8a92a8;pointer-events:none;white-space:nowrap}
#tooltip{position:absolute;display:none;background:rgba(22,24,31,0.95);border:0.5px solid #2e3140;border-radius:10px;padding:7px 11px;pointer-events:none;z-index:30;min-width:100px}
#alert-tip{position:absolute;display:none;z-index:40;pointer-events:none;background:#1e2030;border:0.5px solid #3a3d50;border-radius:9px;padding:7px 11px;font-size:11px;color:#dde2f0;box-shadow:0 4px 18px rgba(0,0,0,0.5);max-width:200px}
#ctx{position:absolute;display:none;background:#1e2030;border:0.5px solid #3a3d50;border-radius:11px;z-index:100;padding:5px;min-width:165px;box-shadow:0 8px 32px rgba(0,0,0,0.55)}
.ci{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:7px;font-size:12px;color:#c0c8d8;cursor:pointer;transition:background .12s}
.ci:hover{background:rgba(255,255,255,0.06)}
.ci.del{color:#E51000}
.ci.del:hover{background:rgba(229,16,0,0.1)}
.ci-sep{height:0.5px;background:#2a2d3a;margin:3px 0}
.ci-head{font-size:10px;color:#5a6070;padding:5px 11px 1px;font-weight:500}
.al-row{display:flex;gap:5px;padding:5px 11px 6px;align-items:center}
.al-btn{width:28px;height:28px;border-radius:7px;border:0.5px solid #3a3d50;background:#12141a;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:#888}
.al-btn:hover{transform:scale(1.12)}
.al-btn.exc{color:#EFC44E;border-color:#5a4a10}
.al-btn.que{color:#3a7ad0;border-color:#1a3a5a}
.al-btn.ast{color:#80B932;border-color:#2a4a1a}
.al-btn.clr{color:#E51000;border-color:#5a1a1a;font-size:11px}
#fab{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#3a7ad0,#1a5ab0);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:21px;color:#fff;transition:transform .18s;pointer-events:all;flex-shrink:0}
#fab:hover{transform:scale(1.09)}
#rst-btn{width:36px;height:36px;border-radius:50%;background:#1a1d26;border:0.5px solid #2e3140;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .22s;padding:0;pointer-events:all;flex-shrink:0}
#rst-btn:hover{background:#251414;border-color:#E51000;transform:rotate(40deg)}
#rst-btn img{width:18px;height:18px;opacity:0.6}
#rst-btn:hover img{opacity:1}
#save-ind{position:fixed;bottom:88px;left:66px;font-size:10px;color:#3a6a44;pointer-events:none;z-index:27;opacity:0;transition:opacity .5s;white-space:nowrap}
#save-ind.show{opacity:1}
#ov{position:absolute;inset:0;background:rgba(0,0,0,0.55);z-index:60;display:none;align-items:center;justify-content:center}
#ov.open{display:flex}
#mdl{background:#1a1d2a;border:0.5px solid #2e3140;border-radius:15px;padding:22px;width:330px;max-width:92vw;box-shadow:0 16px 60px rgba(0,0,0,0.65);max-height:90vh;overflow-y:auto}
#mdl h3{font-size:14px;font-weight:600;color:#e0e4f0;margin-bottom:16px}
.fl{margin-bottom:12px}
.fl label{display:block;font-size:11px;color:#8a92a8;margin-bottom:5px;font-weight:500}
.fl input,.fl select{width:100%;background:#12141e;border:0.5px solid #3a3d50;border-radius:7px;padding:8px 10px;font-size:13px;color:#dde2f0;outline:none;transition:border .15s}
.fl input:focus,.fl select:focus{border-color:#3a7ad0}
.fl select option{background:#1a1d2a}
#av-drop{width:100%;height:74px;border:1px dashed #3a3d50;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#0e1018;position:relative;overflow:hidden;transition:border .15s}
#av-drop:hover{border-color:#3a7ad0}
#av-prev{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
#av-prev img{width:68px;height:68px;object-fit:cover;border-radius:50%;border:2px solid #3a3d50}
#av-ph{font-size:11px;color:#5a6070}
#av-acts{display:none;margin-top:5px}
.av-clr{background:transparent;border:0.5px solid #3a3d50;border-radius:6px;padding:4px 10px;font-size:11px;color:#5a6070;cursor:pointer}
.av-clr:hover{border-color:#E51000;color:#E51000}
.mbs{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.mb{padding:7px 16px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.mb.cn{background:#2a2d3a;color:#8a92a8}
.mb.cn:hover{background:#323544}
.mb.ok{background:#3a7ad0;color:#fff}
.mb.ok:hover{background:#4a8ae0}
#ui-rail{position:fixed;left:0;top:46px;bottom:0;width:58px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:22px;gap:12px;z-index:26;pointer-events:none}
#lc{position:absolute;top:46px;left:0;pointer-events:none;z-index:1}
#c{position:absolute;top:46px;left:0;display:block;z-index:2}
/* RIGHT DETAIL PANEL */
#rpanel{position:absolute;top:46px;right:0;width:280px;height:calc(100vh - 46px);background:#161820;border-left:0.5px solid #2a2d3a;z-index:15;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow-y:auto}
#rpanel.open{transform:translateX(0)}
#rp-close{position:absolute;top:10px;right:12px;background:transparent;border:none;color:#5a6070;font-size:18px;cursor:pointer;z-index:2;line-height:1}
#rp-close:hover{color:#dde2f0}
#rp-av{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:24px auto 12px;font-size:28px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;border:2.5px solid #2a2d3a}
#rp-av img{width:100%;height:100%;object-fit:cover}
#rp-name{font-size:16px;font-weight:600;color:#e0e4f0;text-align:center;padding:0 16px 2px}
#rp-role{font-size:12px;color:#8a92a8;text-align:center;padding:0 16px 14px}
#rp-sep{height:0.5px;background:#2a2d3a;margin:0 16px 14px}
.rp-row{display:flex;align-items:center;justify-content:space-between;padding:6px 18px}
.rp-label{font-size:10px;color:#5a6070;font-weight:500;text-transform:uppercase;letter-spacing:.08em}
.rp-value{font-size:12px;color:#c0c8d8;text-align:right;max-width:150px;word-break:break-word}
.rp-status{display:flex;align-items:center;gap:6px;font-size:12px}
.rp-dot{width:8px;height:8px;border-radius:50%}
#rp-alert-row{padding:8px 18px}
.rp-alert-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:500;margin-bottom:4px}
#rp-fields{padding:0 0 8px}
.rp-field-section{padding:8px 18px 4px;font-size:9px;font-weight:600;color:#3a4050;letter-spacing:.1em;text-transform:uppercase}
.rp-field-row{display:flex;align-items:center;gap:8px;padding:4px 18px;cursor:pointer}
.rp-field-row:hover{background:rgba(255,255,255,0.03)}
.rp-field-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.rp-field-val{font-size:11.5px;color:#c0c8d8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rp-field-val.empty{color:#3a4050;font-style:italic}
.rp-field-val a{color:#5a9ae8;text-decoration:none}
.rp-field-val a:hover{text-decoration:underline}
#rp-ai-section{padding:10px 16px;border-top:0.5px solid #2a2d3a;margin-top:4px}
#rp-ai-btn{width:100%;padding:8px;border-radius:8px;background:#141e2e;border:0.5px solid #2a4070;color:#5a8ac8;font-size:11px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
#rp-ai-btn:hover{background:#1a2840;border-color:#3a5a90;color:#8ab8e8}
#rp-ai-result{font-size:11px;color:#9aa0b8;line-height:1.5;padding:8px 0 4px;display:none}
#rp-actions{padding:12px 16px;display:flex;flex-direction:column;gap:8px;border-top:0.5px solid #2a2d3a}
.rp-btn{padding:9px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s;text-align:center}
.rp-btn.edit{background:#1e2a40;color:#8ab8e8;border:0.5px solid #2a4a70}
.rp-btn.edit:hover{background:#253450}
.rp-btn.add{background:#1a2e1a;color:#80B932;border:0.5px solid #2a4a1a}
.rp-btn.add:hover{background:#203820}
.rp-btn.del{background:#1e1010;color:#E51000;border:0.5px solid #4a1010}
.rp-btn.del:hover{background:#2a1414}
/* AVATAR CROP MODAL */
#crop-ov{position:absolute;inset:0;background:rgba(0,0,0,0.7);z-index:80;display:none;align-items:center;justify-content:center}
#crop-ov.open{display:flex}
#crop-box{background:#1a1d2a;border:0.5px solid #2e3140;border-radius:16px;padding:0;width:320px;max-width:94vw;overflow:hidden}
#crop-title{padding:14px 18px 10px;font-size:13px;font-weight:600;color:#dde2f0;border-bottom:0.5px solid #2a2d3a}
#crop-stage{position:relative;width:100%;height:280px;overflow:hidden;background:#0a0c12;cursor:grab}
#crop-stage:active{cursor:grabbing}
#crop-img{position:absolute;transform-origin:center;user-select:none;pointer-events:none}
#crop-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:220px;height:220px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);pointer-events:none;box-shadow:0 0 0 1000px rgba(0,0,0,0.5)}
#crop-controls{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 18px;border-top:0.5px solid #2a2d3a}
.crop-ctrl-btn{background:#2a2d3a;border:none;color:#dde2f0;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.crop-ctrl-btn:hover{background:#3a3d50}
#crop-scale-lbl{font-size:11px;color:#5a6070;min-width:40px;text-align:center}
#crop-footer{display:flex;gap:8px;padding:12px 18px;border-top:0.5px solid #2a2d3a}
#crop-footer button{flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none}
#crop-cancel{background:#2a2d3a;color:#8a92a8}
#crop-confirm{background:#3a7ad0;color:#fff}
/* MOBILE */
@media(max-width:600px){
  #topbar{gap:3px;padding:0 8px;overflow-x:auto;scrollbar-width:none}
  #topbar::-webkit-scrollbar{display:none}
  .tbtn{padding:4px 7px;font-size:10px}
  .view-btn{padding:4px 7px;font-size:10px}
  #logo-img{height:16px}
  #sidebar{width:220px}
  #fab{width:44px;height:44px;font-size:20px;bottom:20px;right:16px}
  #rst-btn{top:52px;right:10px;width:32px;height:32px}
  #hint{font-size:9px;padding:3px 10px;top:52px}
}
/* Touch long-press indicator */
.touch-hint{position:absolute;pointer-events:none;z-index:50;border-radius:50%;border:2px solid rgba(255,255,255,0.4);animation:th-anim .5s ease-out forwards}
@keyframes th-anim{0%{transform:scale(0);opacity:1}100%{transform:scale(1.5);opacity:0}}
</style>
</head>

// ===== LAYOUT ENGINE — proper non-overlapping tree =====
// Assigns subtree widths bottom-up, places nodes top-down
// Works in both 2D (Z=0) and 3D (Z spread)

function getSubtreeWidth(id, depth){
  var n=nodeMap[id];
  if(!expN.has(id)||!n.children.length) return n.sz*2.2+8;
  var total=0;
  n.children.forEach(function(c){ total+=getSubtreeWidth(c.id,depth+1)+6; });
  return Math.max(total-6, n.sz*2.2+8);
}

function placeSubtree(id, cx, cy, cz, depth, parentAngle){
  var n=nodeMap[id];
  n.targetPos.set(cx,cy,cz);
  if(!expN.has(id)||!n.children.length) return;

  var kids=n.children;
  var nKids=kids.length;

  if(is2D){
    // Pure 2D: spread horizontally, step down
    var yStep=-(72+n.sz*1.4);
    var widths=kids.map(function(c){return getSubtreeWidth(c.id,depth+1);});
    var totalW=widths.reduce(function(a,b){return a+b;},0)+(nKids-1)*8;
    var x=-totalW/2;
    kids.forEach(function(c,i){
      var w=widths[i];
      placeSubtree(c.id, cx+x+w/2, cy+yStep, 0, depth+1, 0);
      x+=w+8;
    });
  } else {
    // 3D: radial fan centered on parentAngle
    // Radius depends on depth
    var radii=[0,200,140,95,68,50,38];
    var r=radii[Math.min(depth,radii.length-1)];
    // Angular spread depends on number of kids and depth
    var spreads=[0, Math.PI*1.6, Math.PI*1.3, Math.PI*1.1, Math.PI*0.9, Math.PI*0.75, Math.PI*0.6];
    var spread=spreads[Math.min(depth,spreads.length-1)];
    // Limit spread for many children
    if(nKids>6) spread=Math.min(spread, Math.PI*0.8);
    // Y drop per level
    var yDrops=[0,-72,-62,-52,-42,-34,-26];
    var yDrop=yDrops[Math.min(depth,yDrops.length-1)];
    // Z spread decreases with depth
    var zFacs=[0,0.45,0.38,0.28,0.18,0.1,0.05];
    var zFac=zFacs[Math.min(depth,zFacs.length-1)];

    kids.forEach(function(c,i){
      var f=nKids===1?0.5:i/(nKids-1);
      var angle=parentAngle - spread/2 + f*spread;
      var nx=cx+Math.cos(angle)*r;
      var ny=cy+yDrop;
      var nz=cz+Math.sin(angle)*r*zFac;
      placeSubtree(c.id, nx, ny, nz, depth+1, angle);
    });
  }
}

// Push-apart collision resolution with spring forces
function resolveCollisions(){
  var ns2=Object.values(nodeMap).filter(function(n){return visN.has(n.id);});
  var count=ns2.length;
  if(count<2)return;

  // Multiple passes — more passes = better separation
  var passes=is2D?6:5;
  for(var it=0;it<passes;it++){
    for(var i=0;i<count;i++){
      for(var j=i+1;j<count;j++){
        var a=ns2[i],b=ns2[j];
        // Skip if not siblings or close relatives — only push apart same-level or nearby
        var minD=(a.sz+b.sz)*0.6+22;
        var dx=b.targetPos.x-a.targetPos.x;
        var dy=b.targetPos.y-a.targetPos.y;
        var dz=is2D?0:(b.targetPos.z-a.targetPos.z);
        var d2=dx*dx+dy*dy+dz*dz;
        if(d2<minD*minD&&d2>0.0001){
          var d=Math.sqrt(d2);
          var push=(minD-d)/d;
          // Horizontal push stronger than vertical (preserve Y structure)
          var px=dx*push*0.55;
          var pz=dz*push*(is2D?0:0.45);
          var py=dy*push*0.15; // very little vertical push to keep hierarchy
          a.targetPos.x-=px; a.targetPos.z-=pz; a.targetPos.y-=py;
          b.targetPos.x+=px; b.targetPos.z+=pz; b.targetPos.y+=py;
        }
      }
    }
  }
}

function calcPos(){
  // Find ALL root nodes (parentId === null)
  var roots = Object.values(nodeMap).filter(function(n){
    return !n.parentId;
  });

  if(is2D){
    // 2D: lay roots out horizontally, each with its own subtree below
    var rootWidths = roots.map(function(r){ return getSubtreeWidth(r.id, 1) + 40; });
    var totalW = rootWidths.reduce(function(a,b){return a+b;}, 0);
    var x = -totalW/2;
    roots.forEach(function(r, i){
      var cx = x + rootWidths[i]/2;
      placeSubtree(r.id, cx, 170, 0, 1, -Math.PI/2);
      x += rootWidths[i];
    });
  } else {
    // 3D: arrange roots in a circle or row, each subtree fans out independently
    var n = roots.length;
    roots.forEach(function(r, i){
      var angle, cx, cy, cz;
      if(n === 1){
        cx=0; cy=60; cz=0; angle=-Math.PI/2;
      } else {
        // Space roots evenly around a wide arc
        var spread = Math.min(Math.PI*1.8, n*0.9);
        var a = -Math.PI/2 - spread/2 + (i/(n-1))*spread;
        var dist = Math.max(320, n*90);
        cx = Math.cos(a)*dist;
        cy = 60;
        cz = Math.sin(a)*dist*0.25;
        angle = a; // subtree fans out from this angle
      }
      placeSubtree(r.id, cx, cy, cz, 1, angle);
    });
  }

  // Resolve collisions between ALL visible nodes across all trees
  resolveCollisions();
}

    var indent="  ".repeat(depth);

    if(nd.alert)line+=" ["+AL[nd.alert.type].sym+"]";
    var kids=nd.children.filter(function(c){return nodeMap[c.id];});
    return line+(kids.length?"
"+kids.map(function(c){return descNode(nodeMap[c.id],depth+1);}).join("
"):"");
  }
  var treeDesc=descNode(n,0);
  var entityInfo=n.entityType==="person"
    ? "Телефон: "+(n.phone||"—")+", Email: "+(n.email||"—")+", Локация: "+(n.location||"—")

Название: "+n.label+"
Роль: "+n.role+"
Тип: "+(n.entityType==="person"?"Человек":"Организация/Отдел")+"
"+entityInfo+"

Структура:
"+treeDesc+"

Фокус: статус, риски, ключевые люди.";

  try{

      method:"POST",

var _cropScale=1,_cropX=0,_cropY=0,_cropDragging=false,_cropLX=0,_cropLY=0,_cropSrcB64=null,_cropTarget=null;

function openCrop(b64,targetInputId){
  _cropSrcB64=b64;_cropTarget=targetInputId;_cropScale=1;_cropX=0;_cropY=0;
  var img=document.getElementById("crop-img");img.src=b64;
  document.getElementById("crop-ov").classList.add("open");
  document.getElementById("crop-scale-lbl").textContent="100%";
  // Wait for image to load to center it
  img.onload=function(){
    var stage=document.getElementById("crop-stage");
    var sw=stage.offsetWidth,sh=stage.offsetHeight;
    var scale=Math.max(220/img.naturalWidth,220/img.naturalHeight);
    _cropScale=scale;
    updateCropImg();
  };
}
function updateCropImg(){
  var img=document.getElementById("crop-img");
  var stage=document.getElementById("crop-stage");
  var sw=stage.offsetWidth,sh=stage.offsetHeight;
  img.style.width=(img.naturalWidth*_cropScale)+"px";
  img.style.height=(img.naturalHeight*_cropScale)+"px";
  img.style.left=(sw/2-img.naturalWidth*_cropScale/2+_cropX)+"px";
  img.style.top=(sh/2-img.naturalHeight*_cropScale/2+_cropY)+"px";
  document.getElementById("crop-scale-lbl").textContent=Math.round(_cropScale*100)+"%";
}
function confirmCrop(){
  var img=document.getElementById("crop-img");
  var stage=document.getElementById("crop-stage");
  var sw=stage.offsetWidth,sh=stage.offsetHeight;
  var ringW=220,ringH=220;
  // Ring center in stage coords
  var ringL=sw/2-ringW/2,ringT=sh/2-ringH/2;
  // Image position
  var imgL=parseFloat(img.style.left),imgT=parseFloat(img.style.top);
  // Crop source rect in natural image coords
  var srcX=(ringL-imgL)/_cropScale,srcY=(ringT-imgT)/_cropScale;
  var srcW=ringW/_cropScale,srcH=ringH/_cropScale;
  var cv=document.createElement("canvas");cv.width=400;cv.height=400;
  var ctx2=cv.getContext("2d");
  ctx2.drawImage(img,srcX,srcY,srcW,srcH,0,0,400,400);
  var b64=cv.toDataURL("image/jpeg",0.88);
  // Set to modal avatar
  setAvPrev(b64);
  document.getElementById("crop-ov").classList.remove("open");
}

// Crop events
document.addEventListener("DOMContentLoaded",function(){
  var stage=document.getElementById("crop-stage");
  // Mouse drag
  stage.addEventListener("mousedown",function(e){_cropDragging=true;_cropLX=e.clientX;_cropLY=e.clientY;e.preventDefault();});
  window.addEventListener("mousemove",function(e){if(!_cropDragging)return;_cropX+=e.clientX-_cropLX;_cropY+=e.clientY-_cropLY;_cropLX=e.clientX;_cropLY=e.clientY;updateCropImg();});
  window.addEventListener("mouseup",function(){_cropDragging=false;});
  // Touch drag
  stage.addEventListener("touchstart",function(e){e.preventDefault();_cropDragging=true;_cropLX=e.touches[0].clientX;_cropLY=e.touches[0].clientY;},{passive:false});
  stage.addEventListener("touchmove",function(e){e.preventDefault();if(!_cropDragging)return;_cropX+=e.touches[0].clientX-_cropLX;_cropY+=e.touches[0].clientY-_cropLY;_cropLX=e.touches[0].clientX;_cropLY=e.touches[0].clientY;updateCropImg();},{passive:false});
  stage.addEventListener("touchend",function(){_cropDragging=false;});
  // Zoom buttons
  document.getElementById("crop-zoom-in").onclick=function(){_cropScale=Math.min(_cropScale*1.15,5);updateCropImg();};
  document.getElementById("crop-zoom-out").onclick=function(){_cropScale=Math.max(_cropScale/1.15,0.1);updateCropImg();};
  document.getElementById("crop-reset-btn").onclick=function(){_cropX=0;_cropY=0;var img=document.getElementById("crop-img");var scale=Math.max(220/img.naturalWidth,220/img.naturalHeight);_cropScale=scale;updateCropImg();};
  document.getElementById("crop-cancel").onclick=function(){document.getElementById("crop-ov").classList.remove("open");};
  document.getElementById("crop-confirm").onclick=confirmCrop;
  // Wheel zoom in crop
  stage.addEventListener("wheel",function(e){e.preventDefault();_cropScale=Math.max(0.1,Math.min(5,_cropScale*(e.deltaY>0?0.92:1.09)));updateCropImg();},{passive:false});
});

// ===== PATH ANIMATION =====
function buildPath(id){
  var path=[],cur=nodeMap[id];
  while(cur){path.unshift(cur.id);cur=cur.parentId?nodeMap[cur.parentId]:null;}
  var vis=path.filter(function(nid){return visN.has(nid);});
  if(vis.length<2)return;
  var edges=[];for(var i=1;i<vis.length;i++)edges.push({from:vis[i-1],to:vis[i]});
  pathAnim={active:true,nodes:vis,edges:edges,timer:0};dotProgress=0;
}
function getPathPts(){
  var pts=[];
  pathAnim.nodes.forEach(function(nid){if(visN.has(nid)){var nd=nodeMap[nid];pts.push(proj(nd.pos));}});
  return pts;
}
function pathLen(pts){var l=0;for(var i=1;i<pts.length;i++){var dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y;l+=Math.sqrt(dx*dx+dy*dy);}return l;}
function posOnPath(pts,t){
  var tot=pathLen(pts),tgt=t*tot,acc=0;
  for(var i=1;i<pts.length;i++){var dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y,seg=Math.sqrt(dx*dx+dy*dy);
    if(acc+seg>=tgt){var f=(tgt-acc)/seg;return{x:pts[i-1].x+dx*f,y:pts[i-1].y+dy*f};}acc+=seg;}
  return pts[pts.length-1]||{x:0,y:0};
}
function pathColor(){
  if(!pathAnim.nodes.length)return[128,180,255];
  var lastId=pathAnim.nodes[pathAnim.nodes.length-1];
  var ec=curMode===4?MONO:(effCol[lastId]||nodeMap[lastId].color||0x3a7ad0);
  return h2r(ec);
}

function delNode(id){
  if(id==="mixa")return;
  var n=nodeMap[id];var par=n.parentId?nodeMap[n.parentId]:null;
  if(par)par.children=par.children.filter(function(c){return c.id!==id;});
  function rmSub(nid){var nd=nodeMap[nid];if(!nd)return;nd.children.forEach(function(c){rmSub(c.id);});
    visN.delete(nid);expN.delete(nid);delete nodeMap[nid];
    if(sprO[nid]){scene.remove(sprO[nid]);delete sprO[nid];}
    if(lblO[nid]){scene.remove(lblO[nid]);delete lblO[nid];}
    if(hitO[nid]){scene.remove(hitO[nid]);delete hitO[nid];}
    delete effCol[nid];}
  rmSub(id);if(selId===id)selId=null;
  calcPos();rebuildEdges();applyMode(null);buildSB();scheduleSave();
}

function submitMdl(){
  var name=document.getElementById("fi-n").value.trim();if(!name)return;
  var role=document.getElementById("fi-r").value.trim()||"Member";
  var shape=document.getElementById("fi-s").value;
  var col={green:C.green,yellow:C.yellow,red:C.red,gray:C.gray}[document.getElementById("fi-c").value]||C.gray;
  if(mdlMode==="newroot"){
    // Create a completely independent root node
    var nid=uid();
    var newRoot=mkN(nid,name,role,shape,col,28,nid);
    newRoot.lvl=1;newRoot.parentId=null;newRoot.opacity=1;newRoot.avatar=curAv;
    newRoot.birthTime=performance.now()/1000;
    nodeMap[nid]=newRoot;effCol[nid]=col;STM[nid]="green";
    // Place it offset from existing nodes — find a free spot
    var angle=Math.random()*Math.PI*2;
    var dist=280+Math.random()*120;
    newRoot.targetPos.set(Math.cos(angle)*dist, 40, Math.sin(angle)*dist*0.3);
    newRoot.pos.copy(newRoot.targetPos);
    mkSprite(newRoot);
    visN.add(nid);
    applyMode(null);buildSB();scheduleSave();closeMdl();
    // Select new node
    selId=nid;lastCId=nid;openRPanel(nid);
    return;
  }
  if(mdlMode==="edit"){
    var n=nodeMap[mdlTgt];n.label=name;n.role=role;n.shape=shape;n.color=col;n.avatar=curAv;
    n.entityType=document.getElementById("fi-et").value||"person";
    effCol[n.id]=col;
    if(sprO[n.id]){sprO[n.id].material.map=mkTex(n,false);sprO[n.id].material.needsUpdate=true;}
    updLbl(n.id,0xe8edf8,col);
  } else {
    var parId=document.getElementById("fi-p").value||"mixa";
    if(parId==="__newroot__"){
      // Create as independent root node
      var nid2=uid();
      var newRoot2=mkN(nid2,name,role,shape,col,28,nid2);
      newRoot2.lvl=1;newRoot2.parentId=null;newRoot2.opacity=1;newRoot2.avatar=curAv;

  if(!_tMoved&&e.changedTouches.length===1){
    var p=touchPos(e,0)||{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
    var now2=Date.now();
    var id=hitTest(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
    if(id){
      // Double tap → context menu
      if(id===_tTapId&&(now2-_tLastTap)<350){showCtx(id,e.changedTouches[0].clientX,Math.min(e.changedTouches[0].clientY,window.innerHeight-210));}
      else handleClick(id);

  isDrag=false;isPan=false;
},{passive:false});
canvas.addEventListener("mousedown",function(e){moved=false;lastX=e.clientX;lastY=e.clientY;if(e.button===1){isPan=true;e.preventDefault();}else if(e.button===0){if(spDown||is2D)isPan=true;else isDrag=true;}canvas.style.cursor=isPan?"move":"grabbing";});
window.addEventListener("mouseup",function(){isDrag=false;isPan=false;canvas.style.cursor=spDown||is2D?"move":"grab";});
window.addEventListener("mousemove",function(e){
  var dx=e.clientX-lastX,dy=e.clientY-lastY;if(Math.abs(dx)>1||Math.abs(dy)>1)moved=true;
  if(isPan){var sc=tSph.r/700;tPan.x-=dx*sc;tPan.y+=dy*sc;}
  else if(isDrag&&!is2D){tSph.theta-=dx*.006;tSph.phi=Math.max(.05,Math.min(Math.PI-.05,tSph.phi+dy*.006));}
  lastX=e.clientX;lastY=e.clientY;
  var rect=canvas.getBoundingClientRect();mouse.x=((e.clientX-rect.left)/W)*2-1;mouse.y=-((e.clientY-rect.top)/H)*2+1;
  ray.setFromCamera(mouse,camera);
  var hit=ray.intersectObjects(Object.values(hitO).filter(function(m){return visN.has(m.userData.id);}));
  var newH=hit.length?hit[0].object.userData.id:null;
  if(newH!==hovId){if(hovId&&hovId!==selId)rfx(hovId,false);hovId=newH;if(hovId&&hovId!==selId)rfx(hovId,true);}
  if(newH&&!isPan){
    var n=nodeMap[newH];
    // Alert tooltip
    if(n.alert){var t=AL[n.alert.type];atTip.style.display="block";atTip.style.left=(e.clientX+14)+"px";atTip.style.top=(e.clientY-50)+"px";atTip.style.borderColor=(t?t.col:"#888")+"55";atTip.innerHTML="<span style='font-size:14px;font-weight:700;color:"+(t?t.col:"#888")+"'>"+( t?t.sym:"*")+"</span> "+(n.alert.text||(t?t.label:""));}
    else atTip.style.display="none";
    tip.style.display="block";tip.style.left=(e.clientX+14)+"px";tip.style.top=(e.clientY+20)+"px";
    var alHint=n.alert?(function(){var t2=AL[n.alert.type];return"<div style='margin-top:4px;padding-top:4px;border-top:0.5px solid #2a2d3a;font-size:10px;color:"+(t2?t2.col:"#888")+"'>"+(t2?t2.sym:"*")+" "+(n.alert.text||(t2?t2.label:""))+"</div>";}()):"";
    tip.innerHTML="<div style='font-weight:500;font-size:12px;color:#dde2f0'>"+n.label+"</div><div style='color:#5a6070;font-size:10px;margin-top:2px'>"+n.role+"</div>"+(n.children.length?"<div style='color:#8ab8e8;font-size:10px;margin-top:3px'>"+(expN.has(n.id)?"▲ схлопнуть":"▼ раскрыть")+"</div>":"")+alHint+"<div style='color:#3a4050;font-size:9px;margin-top:3px'>ПКМ = меню</div>";
    canvas.style.cursor="pointer";
  } else if(!isPan&&!isDrag){tip.style.display="none";atTip.style.display="none";canvas.style.cursor=spDown||is2D?"move":"grab";}
});
canvas.addEventListener("contextmenu",function(e){e.preventDefault();var rect=canvas.getBoundingClientRect();mouse.x=((e.clientX-rect.left)/W)*2-1;mouse.y=-((e.clientY-rect.top)/H)*2+1;ray.setFromCamera(mouse,camera);var hit=ray.intersectObjects(Object.values(hitO).filter(function(m){return visN.has(m.userData.id);}));if(hit.length)showCtx(hit[0].object.userData.id,e.clientX,e.clientY);});
canvas.addEventListener("wheel",function(e){e.preventDefault();tSph.r=Math.max(80,Math.min(1200,tSph.r+e.deltaY*.5));},{passive:false});
canvas.addEventListener("click",function(e){if(moved||isPan||spDown)return;var rect=canvas.getBoundingClientRect();mouse.x=((e.clientX-rect.left)/W)*2-1;mouse.y=-((e.clientY-rect.top)/H)*2+1;ray.setFromCamera(mouse,camera);var hit=ray.intersectObjects(Object.values(hitO).filter(function(m){return visN.has(m.userData.id);}));if(hit.length)handleClick(hit[0].object.userData.id);});

function s2c(s,pan){return new THREE.Vector3(pan.x+s.r*Math.sin(s.phi)*Math.sin(s.theta),pan.y+s.r*Math.cos(s.phi),s.r*Math.sin(s.phi)*Math.cos(s.theta));}
function proj(p3){var v=p3.clone();v.project(camera);return{x:(v.x*.5+.5)*W,y:(-.5*v.y+.5)*H};}
function scrRad(n){var e3=n.pos.clone().add(new THREE.Vector3(n.sz*.5,0,0));var c2=proj(n.pos),e2=proj(e3);return Math.sqrt(Math.pow(e2.x-c2.x,2)+Math.pow(e2.y-c2.y,2));}
function shorten(ax,ay,bx,by,amt){var dx=bx-ax,dy=by-ay,d=Math.sqrt(dx*dx+dy*dy);if(d<amt*2)return{x:ax,y:ay};var t=amt/d;return{x:ax+dx*t,y:ay+dy*t};}

// ===== DRAW LINES + PATH ANIM =====
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function drawLines(dt){
  lctx.putImageData(gridSnap,0,0);

  // Update path timer
  var pathPts=[],pc=[128,180,255];
  if(pathAnim.active&&pathAnim.nodes.length>=2){
    pathAnim.timer+=dt;if(pathAnim.timer>=PATH_INT)pathAnim.timer=0;
    pathPts=getPathPts();pc=pathColor();
    dotProgress=pathAnim.timer<PATH_DUR?pathAnim.timer/PATH_DUR:1;
  }

  // Base edges
  edgeData.forEach(function(e){
    var n=nodeMap[e.nid],p=nodeMap[e.pid];if(!n||!p)return;
    if(!visN.has(e.nid)||!visN.has(e.pid))return;
    var ec=curMode===4?MONO:(effCol[e.nid]||n.color);var rgb=h2r(ec);
    var a2=proj(n.pos),b2=proj(p.pos);var rN=scrRad(n)*1.05,rP=scrRad(p)*1.05;
    var sp2=shorten(a2.x,a2.y,b2.x,b2.y,rN),ep2=shorten(b2.x,b2.y,a2.x,a2.y,rP);
    lctx.beginPath();if(e.lvl>=4)lctx.setLineDash([5,9]);else lctx.setLineDash([]);
    lctx.moveTo(sp2.x,sp2.y);lctx.lineTo(ep2.x,ep2.y);
    lctx.strokeStyle="rgba("+rgb[0]+","+rgb[1]+","+rgb[2]+","+(curMode===4?0.26:0.48)+")";
    lctx.lineWidth=1.8;lctx.lineCap="round";lctx.shadowBlur=0;lctx.stroke();lctx.setLineDash([]);
  });

  // Path animation
  if(pathPts.length>=2&&dotProgress>0){
    var pr=pc[0],pg=pc[1],pb2=pc[2];
    var tot=pathLen(pathPts);var reached=dotProgress*tot;
    var flicker=0.7+Math.sin(performance.now()*0.018)*0.3;
    // Draw dashed lit portion
    var acc=0;
    for(var i=1;i<pathPts.length;i++){
      var dx=pathPts[i].x-pathPts[i-1].x,dy=pathPts[i].y-pathPts[i-1].y,segLen=Math.sqrt(dx*dx+dy*dy);
      if(acc>=reached)break;
      var drawLen=Math.min(segLen,reached-acc);
      var fx=pathPts[i-1].x+(dx/segLen)*drawLen,fy=pathPts[i-1].y+(dy/segLen)*drawLen;
      var dashOff=((performance.now()*0.12)%24);
      lctx.save();
      lctx.setLineDash([10,14]);lctx.lineDashOffset=-dashOff;
      lctx.beginPath();lctx.moveTo(pathPts[i-1].x,pathPts[i-1].y);lctx.lineTo(fx,fy);
      lctx.strokeStyle="rgba("+pr+","+pg+","+pb2+","+(0.55+flicker*0.35)+")";
      lctx.lineWidth=2.8;lctx.lineCap="round";
      lctx.shadowBlur=0;
      lctx.stroke();lctx.shadowBlur=0;lctx.setLineDash([]);lctx.restore();
      acc+=segLen;
    }
    // Moving dot
    var dp=posOnPath(pathPts,dotProgress);
    var dotR=4+flicker*2;
    lctx.save();
    
    lctx.fillStyle="rgba("+pr+","+pg+","+pb2+","+(0.7+flicker*0.3)+")";
    lctx.shadowBlur=0;
    lctx.beginPath();lctx.arc(dp.x,dp.y,dotR,0,Math.PI*2);lctx.fill();
    lctx.shadowBlur=0;lctx.fillStyle="rgba(255,255,255,"+(0.7+flicker*0.3)+")";
    lctx.beginPath();lctx.arc(dp.x,dp.y,dotR*0.42,0,Math.PI*2);lctx.fill();
    lctx.restore();
    // Start/end rings
    if(pathPts.length){
      var sp3=pathPts[0];lctx.save();lctx.strokeStyle="rgba("+pr+","+pg+","+pb2+","+(0.5+flicker*0.3)+")";lctx.lineWidth=1.5;lctx.shadowBlur=0;lctx.beginPath();lctx.arc(sp3.x,sp3.y,5,0,Math.PI*2);lctx.stroke();lctx.restore();
      var ep3=pathPts[pathPts.length-1];lctx.save();var eR=6+flicker*4;lctx.strokeStyle="rgba("+pr+","+pg+","+pb2+","+(0.6+flicker*0.3)+")";lctx.lineWidth=2;lctx.shadowBlur=0;lctx.beginPath();lctx.arc(ep3.x,ep3.y,eR,0,Math.PI*2);lctx.stroke();lctx.restore();
    }
  }

  // Alert badges
  Object.values(nodeMap).forEach(function(n){
    if(!n.alert||!visN.has(n.id))return;
    var t=AL[n.alert.type];if(!t)return;
    var col=t.col,rgb2=hex2s(col);
    var np=proj(n.pos),bsz=Math.max(7,scrRad(n)*0.48);
    var bx=np.x+scrRad(n)*1.28,by=np.y-scrRad(n)*1.28;
    var pulse=0.82+Math.sin(performance.now()*0.004)*0.18;
    lctx.save();
        lctx.fillStyle=t.bg;lctx.shadowBlur=0;
    lctx.beginPath();lctx.arc(bx,by,bsz,0,Math.PI*2);lctx.fill();
    lctx.strokeStyle=col;lctx.lineWidth=1.2;lctx.shadowBlur=0;
    lctx.beginPath();lctx.arc(bx,by,bsz,0,Math.PI*2);lctx.stroke();
    lctx.fillStyle=col;lctx.font="bold "+Math.round(bsz*1.1)+"px sans-serif";
    lctx.textAlign="center";lctx.textBaseline="middle";
    lctx.fillText(t.sym,bx,by+1);lctx.restore();
  });

  // ===== DRAW LABELS ON CANVAS =====
  var alertFilterActive = alertFilter !== null;
  var FONT = "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif";

  var labelNodes = [];
  Object.values(nodeMap).forEach(function(n){
    if(!visN.has(n.id)) return;
    var np = proj(n.pos);
    if(np.x < -300 || np.x > W+300 || np.y < -100 || np.y > H+100) return;
    var sr = scrRad(n);
    if(sr < 2) return;
    var filterAlpha = alertFilterActive ? ((n.alert&&n.alert.type===alertFilter)?1.0:0.1) : 1.0;
    var spawnA = 1;
    if(n.birthTime > 0){var age=lastT-n.birthTime;if(age<0)return;if(age<0.4)spawnA=age/0.4;}
    var srAlpha = Math.max(0, Math.min(1, (sr-3)/5));
    var alpha = spawnA * filterAlpha * srAlpha;
    if(alpha < 0.02) return;
    var nameSize = Math.max(10, Math.min(15, sr * 1.0));
    var roleSize = Math.max(8,  Math.min(11, sr * 0.68));
    labelNodes.push({n:n,np:np,sr:sr,alpha:alpha,nameSize:nameSize,roleSize:roleSize});
  });
  labelNodes.sort(function(a,b){return b.n.pos.z-a.n.pos.z;});

  labelNodes.forEach(function(item){
    var n=item.n, np=item.np, sr=item.sr;
    var nameSize=item.nameSize, roleSize=item.roleSize;
    var ec = curMode===4 ? MONO : (effCol[n.id]||n.color);
    var rgb = h2r(ec);

    // Place ABOVE node — gap scales with node size
    var gap = sr + Math.max(6, sr * 0.3);
    // name bottom edge is at np.y - gap
    var nameY = np.y - gap;
    var roleY = nameY - nameSize - 2;
    var tx = np.x;

    lctx.save();
    lctx.globalAlpha = item.alpha;
    lctx.textAlign = "center";

    // ---- ROLE (smaller, on top) ----
    lctx.font = roleSize+"px "+FONT;
    lctx.textBaseline = "bottom";
    // shadow passes
    lctx.fillStyle = "rgba(0,0,0,0.9)";
    lctx.fillText(n.role, tx+1, roleY+1);
    lctx.fillText(n.role, tx-1, roleY+1);
    lctx.fillStyle = "rgba("+rgb[0]+","+rgb[1]+","+rgb[2]+",0.92)";
    lctx.fillText(n.role, tx, roleY);

    // ---- NAME (bigger, below role) ----
    lctx.font = "600 "+nameSize+"px "+FONT;
    lctx.fillStyle = "rgba(0,0,0,0.9)";
    lctx.fillText(n.label, tx+1, nameY+1);
    lctx.fillText(n.label, tx-1, nameY+1);
    lctx.fillStyle = curMode===4 ? "rgba(200,205,212,1)" : "rgba(232,237,248,1)";
    lctx.fillText(n.label, tx, nameY);

    lctx.restore();
  });
}

// ===== ANIMATE =====
function animate(){
  requestAnimationFrame(animate);
  var now=performance.now()/1000,dt=Math.min(now-lastT,.05);lastT=now;
  if(is2D){tSph.theta=0;tSph.phi=Math.PI/2;}
  sph.theta+=(tSph.theta-sph.theta)*.07;sph.phi+=(tSph.phi-sph.phi)*.07;sph.r+=(tSph.r-sph.r)*.07;
  panOff.lerp(tPan,.09);
  var cp=s2c(sph,panOff);camera.position.copy(cp);camera.lookAt(panOff.x,panOff.y,0);camera.up.set(0,1,0);
  if(selId&&visN.has(selId)){
    if(pulAct){pulPh+=dt/PDUL;if(pulPh>=1){pulPh=1;pulAct=false;pulPause=PPAUSE;}}
    else{pulPause-=dt;if(pulPause<=0){pulPh=0;pulAct=true;}}
    drawPulse(effCol[selId]||nodeMap[selId].color,pulPh);
    var sn=nodeMap[selId];pSp.position.copy(sn.pos);pSp.scale.set(sn.sz*5,sn.sz*5,1);pMat.opacity=.9;
  } else {pCv.getContext("2d").clearRect(0,0,128,128);pTex.needsUpdate=true;pMat.opacity=0;}
  Object.values(nodeMap).forEach(function(n){
    n.pos.lerp(n.targetPos,.09);
    var vis=visN.has(n.id),spawn=1;
    if(vis&&n.birthTime>0){var age=now-n.birthTime;if(age<0)spawn=0;else if(age<.4){var tt=age/.4,s2v=1.7;spawn=Math.max(0,Math.min(1,tt*tt*((s2v+1)*tt-s2v)));}}
    var sp=sprO[n.id],lb=lblO[n.id],hm=hitO[n.id];
    if(sp){sp.position.copy(n.pos);sp.scale.set(n.sz*spawn,n.sz*spawn,1);sp.material.opacity=vis?spawn:0;}
    // labels drawn on canvas, skip 3D sprite
    if(hm){hm.position.copy(n.pos);hm.quaternion.copy(camera.quaternion);}
  });
  renderer.render(scene,camera);drawLines(dt);
}
